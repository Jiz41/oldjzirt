<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自在律 成績計算機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --accent: #c8a96e; --accent2: #7eb8c8;
    --hit: #6ec87e; --miss: #c86e6e;
    --text: #e8e4d8; --text-muted: #6a6880; --text-dim: #3a3850;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(126,184,200,0.04) 0%, transparent 60%);
  }
  #app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  header { text-align: center; margin-bottom: 48px; }
  header::after { content: ''; display: block; width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 24px auto 0; }
  .title-jp { font-family: 'Zen Antique Soft', serif; font-size: 28px; color: var(--accent); letter-spacing: 0.3em; line-height: 1; }
  .title-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.2em; margin-top: 8px; text-transform: uppercase; }

  #upload-zone {
    border: 1px dashed var(--border); border-radius: 4px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; overflow: hidden;
  }
  #upload-zone::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(200,169,110,0.02) 0%, transparent 50%); }
  #upload-zone:hover, #upload-zone.drag-over { border-color: var(--accent); background: var(--surface2); }
  #upload-zone .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.6; }
  #upload-zone .label { color: var(--text-muted); font-size: 12px; letter-spacing: 0.1em; }
  #upload-zone .label span { color: var(--accent); }

  #file-info { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-top: 12px; align-items: center; gap: 12px; }
  #file-info.visible { display: flex; }
  .file-name { color: var(--accent); flex: 1; }
  .file-rows { color: var(--text-muted); font-size: 11px; }

  /* ── 期間フィルタ ── */
  #period-filter { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-top: 12px; gap: 12px; align-items: center; flex-wrap: wrap; }
  #period-filter.visible { display: flex; }
  .period-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  #period-filter input[type="date"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 12px; }
  #period-filter input[type="date"]:focus { outline: none; border-color: var(--accent); }
  .period-sep { color: var(--text-muted); font-size: 11px; }
  #period-count { font-size: 11px; color: var(--accent2); margin-left: auto; }

  /* ── Results ── */
  #results { margin-top: 24px; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: 'Zen Antique Soft', serif; font-size: 14px; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0.4; }
  .stat-card.accent2::before { background: var(--accent2); }
  .stat-card.hit::before { background: var(--hit); }
  .stat-card.miss::before { background: var(--miss); }
  .stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-value.pct::after { content: '%'; font-size: 14px; color: var(--text-muted); margin-left: 2px; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 10px 16px; text-align: left; font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody td { padding: 10px 16px; border-bottom: 1px solid var(--text-dim); font-size: 12px; white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  .val-good { color: var(--hit); }
  .val-bad  { color: var(--miss); }
  .val-neutral { color: var(--accent); }
  .val-muted { color: var(--text-muted); }

  /* ── 外れ解剖 ── */
  #miss-analysis { margin-top: 0; }

  .miss-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .miss-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .miss-card-title { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .miss-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--text-dim); font-size: 12px; }
  .miss-row:last-child { border-bottom: none; }
  .miss-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: var(--border); border-radius: 2px; }
  .miss-bar { height: 100%; background: var(--miss); border-radius: 2px; transition: width 0.4s ease; }
  .miss-pct { color: var(--miss); font-size: 11px; min-width: 36px; text-align: right; }
  .miss-label { color: var(--text); min-width: 60px; }
  .miss-count { color: var(--text-muted); font-size: 11px; min-width: 30px; }

  /* ── Gemini推論 ── */
  #inference-section { margin-top: 32px; }
  .inference-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
  .inference-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #gemini-key-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 12px;
  }
  #gemini-key-input::placeholder { color: var(--text-dim); }
  #gemini-key-input:focus { outline: none; border-color: var(--accent); }
  #inference-btn {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 8px 20px; border-radius: 2px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; transition: all 0.2s; white-space: nowrap;
  }
  #inference-btn:hover { background: var(--accent); color: var(--bg); }
  #inference-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #inference-result {
    display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
    padding: 16px; font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap;
  }
  #inference-result.visible { display: block; }
  .inference-loading { color: var(--text-muted); font-size: 11px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  #reset-btn { display: none; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; margin-top: 8px; transition: all 0.2s; }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  #reset-btn.visible { display: inline-block; }
  .error-msg { color: var(--miss); font-size: 11px; margin-top: 8px; display: none; }
  .error-msg.visible { display: block; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 32px 0; }

  /* ── 表/裏 タブ ── */
  .face-tabs { display: none; margin-top: 24px; border-bottom: 1px solid var(--border); }
  .face-tabs.visible { display: flex; }
  .face-tab {
    padding: 10px 24px; font-family: 'Zen Antique Soft', serif; font-size: 13px;
    color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    letter-spacing: 0.2em; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .face-tab:hover { color: var(--text); }
  .face-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .face-tab.ura.active { color: var(--miss); border-bottom-color: var(--miss); }
  .face-panel { display: none; }
  .face-panel.active { display: block; }

  /* ── 期待値ダッシュボード ── */
  .ev-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .ev-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; position: relative; overflow: hidden; }
  .ev-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0.4; }
  .ev-card.positive::before { background: var(--hit); opacity: 1; }
  .ev-card.negative::before { background: var(--miss); opacity: 1; }
  .ev-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .ev-value { font-size: 22px; font-weight: 500; line-height: 1; }
  .ev-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── X投稿ジェネレーター ── */
  .x-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 24px; }
  .x-post-text {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 12px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 12px;
    line-height: 1.8; resize: vertical; min-height: 160px;
  }
  .x-post-text:focus { outline: none; border-color: var(--accent); }
  .x-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .x-char-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .x-char-count.over { color: var(--miss); }
  .btn-x {
    background: transparent; border: 1px solid var(--accent2); color: var(--accent2);
    padding: 7px 16px; border-radius: 2px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; transition: all 0.2s;
  }
  .btn-x:hover { background: var(--accent2); color: var(--bg); }
  .btn-copy {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 16px; border-radius: 2px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; transition: all 0.2s;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 最高配当バナー ── */
  .best-hit-banner {
    background: var(--surface2); border: 1px solid var(--accent); border-radius: 4px;
    padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px;
  }
  .best-hit-icon { font-size: 24px; }
  .best-hit-main { flex: 1; }
  .best-hit-title { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .best-hit-value { font-size: 20px; color: var(--accent); font-weight: 500; }
  .best-hit-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="title-jp">自在律　成績計算機</div>
    <div class="title-sub">Jizairitsu Performance Analyzer</div>
  </header>

  <input type="file" id="file-input" accept=".csv" style="display:none">
  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">⊕</div>
    <div class="label">CSVをドロップ、または<span>タップして選択</span></div>
  </div>

  <div id="file-info">
    <span class="file-name" id="file-name-text">—</span>
    <span class="file-rows" id="file-rows-text">—</span>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <button id="reset-btn" onclick="resetAll()">× リセット</button>

  <!-- 期間フィルタのみ -->
  <div id="period-filter">
    <span class="period-label">期間</span>
    <input type="date" id="f-date-from">
    <span class="period-sep">〜</span>
    <input type="date" id="f-date-to">
    <span id="period-count">— レース</span>
  </div>

  <!-- タブ -->
  <div class="face-tabs" id="face-tabs">
    <button class="face-tab active" onclick="switchFace('omote')">表　── 勝利の記録</button>
    <button class="face-tab ura" onclick="switchFace('ura')">裏　── 負けの解剖</button>
  </div>

  <!-- 表の顔：勝利と繁栄 -->
  <div id="face-omote" class="face-panel active">

    <!-- 期待値ダッシュボード -->
    <div id="ev-dashboard" style="display:none; margin-top:24px;">
      <div class="section-title">── 期待値　ダッシュボード</div>
      <div class="ev-grid" id="ev-cards"></div>

      <!-- 最高配当バナー -->
      <div class="best-hit-banner" id="best-hit-banner" style="display:none;">
        <div class="best-hit-icon">🏆</div>
        <div class="best-hit-main">
          <div class="best-hit-title">今期間　最高配当</div>
          <div class="best-hit-value" id="best-hit-value">—</div>
          <div class="best-hit-detail" id="best-hit-detail">—</div>
        </div>
      </div>

      <!-- X投稿ジェネレーター -->
      <div class="section-title">── X 投稿文　生成</div>
      <div class="x-box">
        <textarea class="x-post-text" id="x-post-text" readonly></textarea>
        <div class="x-actions">
          <button class="btn-x" onclick="openX()">𝕏 で投稿</button>
          <button class="btn-copy" onclick="copyX()">コピー</button>
          <span class="x-char-count" id="x-char-count">0 / 280</span>
        </div>
      </div>
      <div class="divider"></div>
    </div>

    <!-- 成績サマリ -->
    <div id="results" style="margin-top:0;">
      <div class="section-title">── 総合成績</div>
      <div class="stats-grid" id="overview-stats"></div>
      <div class="divider"></div>
      <div class="section-title">── 令別　精度</div>
      <div class="stats-grid" id="rei-stats"></div>
      <div class="divider"></div>
      <div class="section-title">── 券種別　回収率</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>令</th><th>券種</th><th>点数</th><th>投資額</th><th>払戻合計</th><th>回収率</th><th>的中数</th></tr></thead>
          <tbody id="券種-tbody"></tbody>
        </table>
      </div>
      <div class="divider"></div>
      <div class="section-title">── 開催場別　的中率</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>開催場</th><th>レース数</th><th>的中数</th><th>的中率</th><th>晴天令T率</th><th>荒天令T率</th></tr></thead>
          <tbody id="venue-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 裏の顔：外れ解剖 -->
  <div id="face-ura" class="face-panel">
    <div id="miss-analysis" style="margin-top:24px;">
      <div class="section-title">── 外れ解剖　─　負けに不思議の負けなし</div>
      <div class="miss-grid">
        <div class="miss-card">
          <div class="miss-card-title">令種　パターン</div>
          <div id="miss-rei"></div>
        </div>
        <div class="miss-card">
          <div class="miss-card-title">天雲指数帯　外れ率</div>
          <div id="miss-tenun"></div>
        </div>
        <div class="miss-card">
          <div class="miss-card-title">開催場　外れ率順</div>
          <div id="miss-venue"></div>
        </div>
        <div class="miss-card">
          <div class="miss-card-title">決まり手　外れ率順</div>
          <div id="miss-kimari"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div id="inference-section">
        <div class="section-title">── 係数仮説　推論</div>
        <div class="inference-box">
          <div class="inference-input-row">
            <input type="password" id="gemini-key-input" placeholder="Gemini API Key を入力して推論を生成">
            <button id="inference-btn" onclick="runInference()">推論を生成</button>
          </div>
          <div id="inference-result"></div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
// ── State ────────────────────────────────────────────────────
let _allRows = [];

// ── CSV Parser ───────────────────────────────────────────────
function parseCSVLine(line) {
  const fields = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else { inQ = false; } }
      else { cur += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
  }
  fields.push(cur.trim()); return fields;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    if (vals.every(v => v === '')) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = vals[idx] !== undefined ? vals[idx] : ''; });
    rows.push(row);
  }
  return rows;
}

// ── 列名定数 ─────────────────────────────────────────────────
const COL = {
  date: 'レース日', venue: '開催場', tenun: '天雲指数',
  seiTF: '晴天令 T/F', koTF: '荒天令 T/F', hantei: '総合判定',
  kimari: '決まり手', odds3tan: '3連単オッズ', odds3fuku: '3連複オッズ', odds2tan: '2車単オッズ',
};

function toFloat(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
const get    = (row, key) => (row[key] || '').trim();
const isHit  = row => { const v = get(row, COL.hantei); return v.includes('的中') && !v.includes('不的中'); };
const isSeiT = row => get(row, COL.seiTF) === 'T';
const isKoT  = row => get(row, COL.koTF)  === 'T';

// ── 期間フィルタ ─────────────────────────────────────────────
function getFilteredRows() {
  const from = document.getElementById('f-date-from').value;
  const to   = document.getElementById('f-date-to').value;
  return _allRows.filter(row => {
    const d = get(row, COL.date).replace(/\//g, '-');
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  });
}

function onPeriodChange() {
  const rows = getFilteredRows();
  document.getElementById('period-count').textContent =
    `${rows.length.toLocaleString()} / ${_allRows.length.toLocaleString()} レース`;
  renderAll(rows);
}

// ── Analysis ─────────────────────────────────────────────────
function analyze(rows) {
  const total = rows.length;
  const empty = { payout:0, hitCount:0, invest:0, recovery:0 };
  if (total === 0) return { total:0, hits:0, hitRate:0, seiT:0, seiRate:0, koT:0, koRate:0, totalInvest:0, totalPayout:0, totalRecovery:0, kiken:{s3tan:empty,s3fuku:empty,k3fuku:empty,k2tan:empty}, venues:{} };

  const hits    = rows.filter(isHit).length;
  const seiTCnt = rows.filter(isSeiT).length;
  const koTCnt  = rows.filter(isKoT).length;
  const totalInvest = total * 1000;

  const calcKiken = (tfFn, oddsKey, investPerRace) => {
    let payout = 0, hitCount = 0;
    rows.forEach(row => { if (tfFn(row)) { const o = toFloat(get(row, oddsKey)); if (o > 0) { payout += o * 100; hitCount++; } } });
    const invest = total * investPerRace;
    return { payout, hitCount, invest, recovery: invest > 0 ? payout/invest*100 : 0 };
  };

  const s3tan  = calcKiken(isSeiT, COL.odds3tan,  400);
  const s3fuku = calcKiken(isSeiT, COL.odds3fuku, 100);
  const k3fuku = calcKiken(isKoT,  COL.odds3fuku, 200);
  const k2tan  = calcKiken(isKoT,  COL.odds2tan,  300);
  const totalPayout   = s3tan.payout + s3fuku.payout + k3fuku.payout + k2tan.payout;
  const totalRecovery = totalInvest > 0 ? totalPayout/totalInvest*100 : 0;

  const venueMap = {};
  rows.forEach(row => {
    const v = get(row, COL.venue) || '不明';
    if (!venueMap[v]) venueMap[v] = {total:0, hits:0, seiT:0, koT:0};
    venueMap[v].total++;
    if (isHit(row))  venueMap[v].hits++;
    if (isSeiT(row)) venueMap[v].seiT++;
    if (isKoT(row))  venueMap[v].koT++;
  });

  return { total, hits, hitRate: hits/total*100, seiT:seiTCnt, seiRate:seiTCnt/total*100, koT:koTCnt, koRate:koTCnt/total*100, totalInvest, totalPayout, totalRecovery, kiken:{s3tan,s3fuku,k3fuku,k2tan}, venues:venueMap };
}

// ── 外れ解剖集計 ─────────────────────────────────────────────
function analyzeMiss(rows) {
  const misses = rows.filter(r => !isHit(r));
  const total  = misses.length;
  if (total === 0) return null;

  // 令種：TT/TF/FT/FF パターン集計
  // TT = 晴天令的中 かつ 荒天令的中（3連複かぶり）
  // TF = 晴天令的中 かつ 荒天令不的中
  // FT = 晴天令不的中 かつ 荒天令的中
  // FF = 両令不的中（完全外れ）
  const reiPattern = { TT: 0, TF: 0, FT: 0, FF: 0 };
  rows.forEach(r => {
    const s = isSeiT(r), k = isKoT(r);
    if (s && k)       reiPattern.TT++;
    else if (s && !k) reiPattern.TF++;
    else if (!s && k) reiPattern.FT++;
    else              reiPattern.FF++;
  });
  const rei = reiPattern;

  // 天雲指数帯：数値化して判定（小数・スペース対応）、外れ率付き
  const TENUN_KEYS = [0, 33, 67, 100];
  const tenunBands = {};
  TENUN_KEYS.forEach(k => { tenunBands[k] = { miss: 0, total: 0 }; });
  tenunBands['他'] = { miss: 0, total: 0 };
  rows.forEach(r => {
    const raw = get(r, COL.tenun);
    const n   = Math.round(parseFloat(raw));
    const key = TENUN_KEYS.includes(n) ? n : '他';
    tenunBands[key].total++;
    if (!isHit(r)) tenunBands[key].miss++;
  });

  // 開催場：外れ率順上位8（母数付き）
  const venueAllMap = {};
  rows.forEach(r => {
    const v = get(r, COL.venue) || '不明';
    if (!venueAllMap[v]) venueAllMap[v] = { miss: 0, total: 0 };
    venueAllMap[v].total++;
    if (!isHit(r)) venueAllMap[v].miss++;
  });
  const venues = Object.entries(venueAllMap)
    .filter(([,v]) => v.total > 0)
    .sort((a,b) => (b[1].miss/b[1].total) - (a[1].miss/a[1].total))
    .slice(0, 8);

  // 決まり手：外れ率順上位8（母数付き）
  const kimariAllMap = {};
  rows.forEach(r => {
    const k = get(r, COL.kimari) || '不明';
    if (!kimariAllMap[k]) kimariAllMap[k] = { miss: 0, total: 0 };
    kimariAllMap[k].total++;
    if (!isHit(r)) kimariAllMap[k].miss++;
  });
  const kimari = Object.entries(kimariAllMap)
    .filter(([,v]) => v.total > 0)
    .sort((a,b) => (b[1].miss/b[1].total) - (a[1].miss/a[1].total))
    .slice(0, 8);

  return { total, rei, tenunBands, venues, kimari };
}

// ── Render ───────────────────────────────────────────────────
function renderAll(rows) {
  const result = analyze(rows);
  renderStats(result);
  renderEV(result, rows);
  renderXPost(result, rows);
  const missData = analyzeMiss(rows);
  renderMissAnalysis(missData);
  document.getElementById('inference-result').classList.remove('visible');
  document.getElementById('inference-result').textContent = '';
  window._lastMissData = missData;
  window._lastRows = rows;
  // タブ表示
  document.getElementById('face-tabs').classList.add('visible');
}

// ── 期待値ダッシュボード ──────────────────────────────────────
function renderEV(result, rows) {
  const { total, hits, hitRate, totalInvest, totalPayout, totalRecovery, kiken } = result;
  const ev = totalPayout - totalInvest; // 純損益
  const evPerRace = total > 0 ? ev / total : 0;
  const isPlus = ev >= 0;

  // 晴天令・荒天令 各期待値貢献
  const seiPayout = kiken.s3tan.payout + kiken.s3fuku.payout;
  const koPayout  = kiken.k3fuku.payout + kiken.k2tan.payout;
  const seiInvest = total * 500;
  const koInvest  = total * 500;
  const seiEV = seiPayout - seiInvest;
  const koEV  = koPayout  - koInvest;

  // TT/TF/FT/FF分布
  const pat = { TT:0, TF:0, FT:0, FF:0 };
  rows.forEach(r => {
    const s = isSeiT(r), k = isKoT(r);
    if (s && k) pat.TT++; else if (s) pat.TF++; else if (k) pat.FT++; else pat.FF++;
  });

  document.getElementById('ev-dashboard').style.display = 'block';
  document.getElementById('ev-cards').innerHTML = `
    <div class="ev-card ${isPlus?'positive':'negative'}">
      <div class="ev-label">純損益</div>
      <div class="ev-value" style="color:${isPlus?'var(--hit)':'var(--miss)'}">${ev>=0?'+':''}${ev.toLocaleString()}円</div>
      <div class="ev-sub">1レース平均 ${evPerRace>=0?'+':''}${evPerRace.toFixed(0)}円</div>
    </div>
    <div class="ev-card ${seiEV>=0?'positive':'negative'}">
      <div class="ev-label">晴天令　損益貢献</div>
      <div class="ev-value" style="color:${seiEV>=0?'var(--hit)':'var(--miss)'}">${seiEV>=0?'+':''}${seiEV.toLocaleString()}円</div>
      <div class="ev-sub">回収率 ${(seiPayout/seiInvest*100).toFixed(1)}%</div>
    </div>
    <div class="ev-card ${koEV>=0?'positive':'negative'}">
      <div class="ev-label">荒天令　損益貢献</div>
      <div class="ev-value" style="color:${koEV>=0?'var(--hit)':'var(--miss)'}">${koEV>=0?'+':''}${koEV.toLocaleString()}円</div>
      <div class="ev-sub">回収率 ${(koPayout/koInvest*100).toFixed(1)}%</div>
    </div>
    <div class="ev-card">
      <div class="ev-label">令パターン分布</div>
      <div class="ev-value" style="font-size:14px;line-height:1.6;">
        <span style="color:var(--hit)">TT ${pat.TT}</span> /
        <span style="color:var(--accent2)">TF ${pat.TF}</span> /
        <span style="color:var(--accent)">FT ${pat.FT}</span> /
        <span style="color:var(--miss)">FF ${pat.FF}</span>
      </div>
      <div class="ev-sub">FF率 ${(pat.FF/total*100).toFixed(1)}%</div>
    </div>`;

  // 最高配当
  let bestRow = null, bestPayout = 0;
  rows.forEach(r => {
    const p1 = toFloat(get(r, COL.odds3tan)) * 100;
    const p2 = toFloat(get(r, COL.odds3fuku)) * 100;
    const p3 = toFloat(get(r, COL.odds2tan)) * 100;
    const maxP = Math.max(p1, p2, p3);
    if ((isSeiT(r) || isKoT(r)) && maxP > bestPayout) { bestPayout = maxP; bestRow = r; }
  });
  if (bestRow) {
    document.getElementById('best-hit-banner').style.display = 'flex';
    const odds = Math.max(
      toFloat(get(bestRow, COL.odds3tan)),
      toFloat(get(bestRow, COL.odds3fuku)),
      toFloat(get(bestRow, COL.odds2tan))
    );
    document.getElementById('best-hit-value').textContent = `${odds.toFixed(1)} 倍　${Math.round(odds*100).toLocaleString()}円`;
    document.getElementById('best-hit-detail').textContent =
      `${get(bestRow, COL.date)}　${get(bestRow, COL.venue)}`;
  }
}

// ── X投稿生成 ────────────────────────────────────────────────
function renderXPost(result, rows) {
  const { total, hits, hitRate, totalInvest, totalPayout, totalRecovery } = result;
  const ev = totalPayout - totalInvest;

  // 期間取得
  const from = document.getElementById('f-date-from').value;
  const to   = document.getElementById('f-date-to').value;
  const period = (from || to) ? `${from||''}〜${to||''}` : '全期間';

  // 最高配当
  let bestOdds = 0, bestDate = '', bestVenue = '';
  rows.forEach(r => {
    if (!isSeiT(r) && !isKoT(r)) return;
    const o = Math.max(toFloat(get(r,COL.odds3tan)), toFloat(get(r,COL.odds3fuku)), toFloat(get(r,COL.odds2tan)));
    if (o > bestOdds) { bestOdds = o; bestDate = get(r,COL.date); bestVenue = get(r,COL.venue); }
  });

  const sign = ev >= 0 ? '▲' : '▼';
  const post = [
    `【自在律　${period}　成績】`,
    ``,
    `📊 ${total}レース`,
    `的中率　${hitRate.toFixed(1)}%（${hits}/${total}）`,
    `回収率　${totalRecovery.toFixed(1)}%`,
    `損益　${sign}${Math.abs(ev).toLocaleString()}円`,
    bestOdds > 0 ? `
🏆 最高配当` : '',
    bestOdds > 0 ? `${bestDate} ${bestVenue}` : '',
    bestOdds > 0 ? `${bestOdds.toFixed(1)}倍 / ${Math.round(bestOdds*100).toLocaleString()}円` : '',
    ``,
    `#競輪 #自在律 #競輪予想`,
  ].filter(l => l !== null).join('
').trim();

  const ta = document.getElementById('x-post-text');
  const cc = document.getElementById('x-char-count');
  ta.value = post;
  const len = post.length;
  cc.textContent = `${len} / 280`;
  cc.classList.toggle('over', len > 280);
}

function renderMissAnalysis(data) {
  if (!data || data.total === 0) return;

  // 令種：TT/TF/FT/FF パターン分布
  const reiTotal = Object.values(data.rei).reduce((a,b)=>a+b, 0);
  const reiOrder = ['TT','TF','FT','FF'];
  const reiLabels = { TT:'TT（両令的中）', TF:'TF（晴天令のみ的中）', FT:'FT（荒天令のみ的中）', FF:'FF（完全外れ）' };
  const reiMax = Math.max(...Object.values(data.rei));
  document.getElementById('miss-rei').innerHTML =
    reiOrder.map(k => {
      const cnt = data.rei[k] || 0;
      const pct = reiTotal > 0 ? (cnt / reiTotal * 100) : 0;
      const isBad = k === 'FF';
      return `<div class="miss-row">
        <span class="miss-label" style="${isBad?'color:var(--miss)':''}">${reiLabels[k]}</span>
        <span class="miss-count">${cnt}件</span>
        <div class="miss-bar-wrap"><div class="miss-bar" style="width:${pct.toFixed(1)}%;${isBad?'':'background:var(--accent2)'}"></div></div>
        <span class="miss-pct" style="${isBad?'color:var(--miss)':''}">${pct.toFixed(1)}%</span>
      </div>`;
    }).join('');

  // 天雲指数帯（外れ率・設計通り0→33→67→100で外れ率が上がるか確認用）
  const tenunOrder = [0, 33, 67, 100, '他'];
  document.getElementById('miss-tenun').innerHTML =
    tenunOrder.map(k => data.tenunBands[k] ? missRateRow(`指数 ${k}`, data.tenunBands[k]) : '').join('');

  // 開催場（外れ率順）
  document.getElementById('miss-venue').innerHTML =
    data.venues.map(([k,v]) => missRateRow(k, v)).join('');

  // 決まり手（外れ率順）
  document.getElementById('miss-kimari').innerHTML =
    data.kimari.map(([k,v]) => missRateRow(k, v)).join('');
}

// ── Gemini 推論 ───────────────────────────────────────────────
const GEMINI_SYSTEM_PROMPT = `あなたは競輪予想ロジック「自在律（華耀天輪 真・自在律）」の係数チューニング専門家です。
以下はコード実装から抽出した全係数の正確な定義です。

━━━━━━━━━━━━━━━━━━━━
【COEFFICIENT_SETTINGS（級別基本係数）】
━━━━━━━━━━━━━━━━━━━━
's-kyu':  { R_BIAS:1.15, RECENT_WEIGHT:0.90, COOP_WEIGHT:1.20, SUICIDE_LIMIT:0.97 }
'a-kyu':  { R_BIAS:1.00, RECENT_WEIGHT:1.00, COOP_WEIGHT:1.00, SUICIDE_LIMIT:0.93 }
'a-chal': { R_BIAS:0.90, RECENT_WEIGHT:1.20, COOP_WEIGHT:0.80, SUICIDE_LIMIT:0.90 }
'girls':  { R_BIAS:1.00, RECENT_WEIGHT:1.10, COOP_WEIGHT:1.00, SUICIDE_LIMIT:1.00 }

- R_BIAS: 競走得点の最終スコアへの影響度。式: c_score_adj = 1.0 + (score/100 - 1) * R_BIAS
- RECENT_WEIGHT: 直近3走着順の影響度。式: c_recent = (1.0 + (4 - avgRank) * 0.05) * RECENT_WEIGHT
- COOP_WEIGHT: ライン内協調の影響度（番手・3番手への恩恵量）
- SUICIDE_LIMIT: C_suicideのペナルティ上限キャップ値

━━━━━━━━━━━━━━━━━━━━
【C_MARK_VALUES（W印係数）】
━━━━━━━━━━━━━━━━━━━━
◎ → c_wmark = 1.04
〇 → c_wmark = 1.02
✕ → c_wmark = 1.015
△ → c_wmark = 1.01
その他 → 1.0

━━━━━━━━━━━━━━━━━━━━
【SERI_STYLE_BONUS（競り脚質ボーナス）】
━━━━━━━━━━━━━━━━━━━━
逃:1.08 / 追:1.05 / 両:1.00 / 自:0.95
競り勝者(IN):  ×(1 + 0.05) × (1 - 0.15) = 実質 ×0.8925
競り敗者(OUT): × (1 - 0.25) = ×0.75

━━━━━━━━━━━━━━━━━━━━
【S1/B1ボーナス】
━━━━━━━━━━━━━━━━━━━━
c_s1: S1位選手 → ×1.005
c_b1: B1位選手 → ×1.015（B1の方が負荷大のため加点大）

━━━━━━━━━━━━━━━━━━━━
【c_e（バンク脚質バイアス）】
━━━━━━━━━━━━━━━━━━━━
bankdata.jsonのkeirin_biasをバンクごとに参照。
脚質マッピング: 自/逃→先行バイアス / 両→捲りバイアス / 追→差しバイアス

━━━━━━━━━━━━━━━━━━━━
【物理層: straight（直線長ペナルティ）】
━━━━━━━━━━━━━━━━━━━━
straight < 35m:
  4番手以降 → physicalPenalty = 0.25（物理的到達困難）
  3番手     → physicalPenalty = 0.60
straight < 50m:
  4番手以降 → physicalPenalty = 0.50
  3番手     → physicalPenalty = 0.80
50m以上: ペナルティなし（1.0）

━━━━━━━━━━━━━━━━━━━━
【展開層: イン突き（ワープブースト）】
━━━━━━━━━━━━━━━━━━━━
番手選手が競り勝利した場合、3〜4番手選手に warpBoost = ×1.35

━━━━━━━━━━━━━━━━━━━━
【kururu（風圧補正）】
━━━━━━━━━━━━━━━━━━━━
実効風速 v = speed × beta（バンクのbeta係数）
風圧係数 kp:
  v ≤ 3.0m: kp = v × 0.05
  3.0 < v ≤ 7.0: kp = 0.15 + (v-3.0)^1.8 × 0.085
  v > 7.0: kp = 0.51 + (v-7.0)^3.0 × 0.3
kp *= (straight / 50)（直線長補正）

位置別遮蔽率(positionShield):
  先行(0番手)     → 0.60（風をまともに受ける）
  番手(1番手)     → 0.50
  3番手以降       → 0.40（乱流重複で遮蔽大）

finalAdj = 1.0 + (vector × kp × alpha × positionShield)
vector: 追い風+1.0 / 向かい風-1.0 / H→B横風+0.2 / B→H横風-0.2

━━━━━━━━━━━━━━━━━━━━
【天雲指数（calculateTenunIndex）】
━━━━━━━━━━━━━━━━━━━━
晴天令Top3 × 荒天令Top3 の一致数でマッピング:
  3一致 → 指数0  （完全安定）
  2一致 → 指数33 （やや波乱）
  1一致 → 指数67 （波乱）
  0一致 → 指数100（完全混沌）

━━━━━━━━━━━━━━━━━━━━
発動条件（全て同時成立）:
  天雲指数 = 33
  風速 ≤ 2.0m
  晴天令1位選手の脚質が「追」または「両」
  晴天令1位選手のW印が「◎」
有効パターン: "33_差し"（hit_rate:0.0309 > 閾値0.0206）

━━━━━━━━━━━━━━━━━━━━
【荒天令 calculate_koutenrei_bias 係数】
━━━━━━━━━━━━━━━━━━━━

C_risk: p.score < avgScore-2.0 かつ recentAvg >= 4.0 → ×0.97
  「平均以下かつ直近着順が悪い選手は荒天でさらにリスク大」

C_mental: (S級レース OR 最高得点選手) かつ 直近1走1着 → × (1.0 - v×0.005)
  「好調エースほど荒天でプレッシャーで崩れる」仮説

C_recovery: 脚質「両」or「追」かつ scoreDiffRatio > 0.6 → × (1.04 + (ratio-0.6)×0.1)
  「荒天で展開が乱れるほど高得点の差し・追込が台頭」仮説

C_target: 最高得点選手 かつ 競合逃/自/両が2名以上 → × (1.0 - v×0.007)
  「包囲された本命は荒天で潰れる」仮説

C_split: ライン内 (p1.score - p2.score)/scoreRange >= 0.30 → 番手に × (1.0 - (diff-0.30)×0.15)
  「強い先行に弱い番手は荒天では機能しない」仮説

C_pace: 逃/自/両で score >= 105.0 かつ ライン数 >= 2 → ×0.96
  「強い逃げ選手でも荒天の単独逃げは過信禁物」仮説

C_timing: 脚質「両」かつラインの2番手以降 → ×0.97
  「荒天で両脚質の選択が遅れると位置不安定」仮説

C_guard: 番手選手 かつ得点がレンジ下位40% かつ攻撃選手2名以上
  → baseRisk = 0.95（得点低） × 0.95（攻撃2名以上）= 最小0.9025
  「荒天で弱い番手の防御は破綻する」仮説

C_suicide: 3名以上ライン かつ W印持ち3名 かつ自力選手あり の"リスク極大ライン"を検出
  → リスクライン員: × (1.0 - (1.0-SUICIDE_LIMIT) × min(v,7)/7) の動的ペナルティ
  → 非リスクライン員: × 1.05（漁夫の利ボーナス）
  → 単騎選手: × 1.02

合計: 1レース1000円

【回答形式】
- 具体的な係数名を必ず挙げること
- 箇条書き3〜5項目
- 断定せず「可能性がある」「考えられる」という表現で
- 開催場の偏りがある場合はstraightペナルティやc_eバイアスとの関連も考察すること
- 日本語で回答すること`;

async function runInference() {
  const key = document.getElementById('gemini-key-input').value.trim();
  if (!key) { alert('Gemini API Keyを入力してください'); return; }
  if (!window._lastMissData) { alert('CSVを読み込んでください'); return; }

  const btn = document.getElementById('inference-btn');
  const resultEl = document.getElementById('inference-result');
  btn.disabled = true;
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<span class="inference-loading">── 推論中...</span>';

  const d = window._lastMissData;
  const rows = window._lastRows || [];
  const total = rows.length;
  const missRate = total > 0 ? (d.total / total * 100).toFixed(1) : '?';

  const fmtRei = obj => Object.entries(obj).map(([k,v]) => {
    const r = v.total > 0 ? (v.miss/v.total*100).toFixed(1) : '0.0';
    return `  ${k}: 外れ率${r}% (${v.miss}/${v.total}件)`;
  }).join('\n');

  const tenunOrder = [0, 33, 67, 100, '他'];
  const fmtTenun = obj => tenunOrder.map(k => {
    const v = obj[k];
    if (!v) return '';
    const r = v.total > 0 ? (v.miss/v.total*100).toFixed(1) : '0.0';
    return `  指数${k}: 外れ率${r}% (${v.miss}/${v.total}件)`;
  }).filter(Boolean).join('\n');

  const fmtList = arr => arr.map(([k,v]) => {
    const r = v.total > 0 ? (v.miss/v.total*100).toFixed(1) : '0.0';
    return `  ${k}: 外れ率${r}% (${v.miss}/${v.total}件)`;
  }).join('\n');

  const prompt = `【外れ解剖データ】
総レース数: ${total} / 外れ数: ${d.total} (外れ率: ${missRate}%)

■ 令種パターン分布（TT=両令的中/TF=晴天令のみ/FT=荒天令のみ/FF=完全外れ）
${(['TT','TF','FT','FF'].map(k => {
  const cnt = d.rei[k]||0;
  const pct = (cnt/rows.length*100).toFixed(1);
  return `  ${k}: ${cnt}件 (${pct}%)`;
}).join('\n'))}
※ FFが外れ解剖の本質。FFが集中する条件を以下のデータから読み取ること。

■ 天雲指数帯別 外れ率（指数0→100で外れ率が上がるのが設計上の正常動作）
${fmtTenun(d.tenunBands)}

■ 開催場別 外れ率（外れ率順上位）
${fmtList(d.venues)}

■ 決まり手別 外れ率（外れ率順上位）
${fmtList(d.kimari)}

このデータから、自在律のどの係数に問題がある可能性がありますか？`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: GEMINI_SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts: [{ text: prompt }] }]
        })
      }
    );
    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '（応答なし）';
    resultEl.textContent = text;
  } catch (err) {
    resultEl.textContent = `エラー: ${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── File Handling ────────────────────────────────────────────
function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) { showError('CSVファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let rows = parseCSV(e.target.result);
      if (rows.length === 0) {
        // Shift-JISで再試行
        const reader2 = new FileReader();
        reader2.onload = e2 => {
          try {
            const rows2 = parseCSV(e2.target.result);
            if (rows2.length === 0) { showError('データが見つかりませんでした'); return; }
            _allRows = rows2;
            document.getElementById('file-info').classList.add('visible');
            document.getElementById('file-name-text').textContent = file.name;
            document.getElementById('file-rows-text').textContent = \`\${rows2.length.toLocaleString()} レース\`;
            document.getElementById('upload-zone').style.display = 'none';
            document.getElementById('period-filter').classList.add('visible');
            document.getElementById('period-count').textContent = \`\${rows2.length.toLocaleString()} / \${rows2.length.toLocaleString()} レース\`;
            ['f-date-from','f-date-to'].forEach(id => {
              document.getElementById(id).addEventListener('change', onPeriodChange);
              document.getElementById(id).addEventListener('input', onPeriodChange);
            });
            renderAll(rows2);
          } catch(err2) { showError('解析エラー: ' + err2.message); }
        };
        reader2.readAsText(file, 'Shift-JIS');
        return;
      }
      _allRows = rows;
      document.getElementById('file-info').classList.add('visible');
      document.getElementById('file-name-text').textContent = file.name;
      document.getElementById('file-rows-text').textContent = `${rows.length.toLocaleString()} レース`;
      document.getElementById('upload-zone').style.display = 'none';
      document.getElementById('period-filter').classList.add('visible');
      document.getElementById('period-count').textContent = `${rows.length.toLocaleString()} / ${rows.length.toLocaleString()} レース`;
      ['f-date-from','f-date-to'].forEach(id => {
        document.getElementById(id).addEventListener('change', onPeriodChange);
        document.getElementById(id).addEventListener('input', onPeriodChange);
      });
      renderAll(rows);
    } catch (err) { showError('解析エラー: ' + err.message); }
  };
  reader.onloadend = () => {};
  reader.onerror = () => { showError('ファイル読み込みエラーが発生しました'); };
  // UTF-8で試みてパース失敗したらShift-JISで再試行
  reader.readAsText(file, 'UTF-8');
}

function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.classList.add('visible'); }

function resetAll() {
  _allRows = [];
  window._lastMissData = null;
  window._lastRows = null;
  document.getElementById('upload-zone').style.display = '';
  document.getElementById('file-info').classList.remove('visible');
  document.getElementById('period-filter').classList.remove('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('reset-btn').classList.remove('visible');
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('inference-result').classList.remove('visible');
  document.getElementById('face-tabs').classList.remove('visible');
  document.getElementById('ev-dashboard').style.display = 'none';
  document.getElementById('best-hit-banner').style.display = 'none';
  document.getElementById('x-post-text').value = '';
  document.getElementById('f-date-from').value = '';
  document.getElementById('f-date-to').value = '';
  document.getElementById('file-input').value = '';
  switchFace('omote');
}

document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
</script>
