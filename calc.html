<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自在律 成績計算機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --accent: #c8a96e; --accent2: #7eb8c8;
    --hit: #6ec87e; --miss: #c86e6e;
    --text: #e8e4d8; --text-muted: #6a6880; --text-dim: #3a3850;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(126,184,200,0.04) 0%, transparent 60%);
  }
  #app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  header { text-align: center; margin-bottom: 48px; }
  header::after { content: ''; display: block; width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 24px auto 0; }
  .title-jp { font-family: 'Zen Antique Soft', serif; font-size: 28px; color: var(--accent); letter-spacing: 0.3em; line-height: 1; }
  .title-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.2em; margin-top: 8px; text-transform: uppercase; }

  /* ── Sheets 入力UI ── */
  #sheets-zone {
    border: 1px dashed var(--border); border-radius: 4px; padding: 48px 24px;
    text-align: center; background: var(--surface); position: relative;
  }
  #sheets-zone::before { content: ''; position: absolute; inset: 0; border-radius: 4px; background: linear-gradient(135deg, rgba(200,169,110,0.02) 0%, transparent 50%); pointer-events: none; }
  #sheets-load-btn {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 12px 32px; border-radius: 2px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.15em; transition: all 0.2s;
  }
  #sheets-load-btn:hover { background: var(--accent); color: var(--bg); }
  #sheets-load-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #sheets-status { font-size: 11px; margin-top: 16px; display: none; }
  #sheets-status.visible { display: block; }
  #sheets-status.loading { color: var(--text-muted); animation: pulse 1.5s infinite; }
  #sheets-status.ok { color: var(--hit); }
  #sheets-status.err { color: var(--miss); }

  #file-info { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-top: 12px; align-items: center; gap: 12px; }
  #file-info.visible { display: flex; }
  .file-name { color: var(--accent); flex: 1; }
  .file-rows { color: var(--text-muted); font-size: 11px; }

  /* ── 期間フィルタ ── */
  #period-filter { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-top: 12px; gap: 12px; align-items: center; flex-wrap: wrap; }
  #period-filter.visible { display: flex; }
  .period-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  #period-filter input[type="date"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 12px; }
  #period-filter input[type="date"]:focus { outline: none; border-color: var(--accent); }
  .period-sep { color: var(--text-muted); font-size: 11px; }
  #period-count { font-size: 11px; color: var(--accent2); margin-left: auto; }

  /* ── Results ── */
  #results { display: none; margin-top: 32px; animation: fadeIn 0.4s ease; }
  #results.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: 'Zen Antique Soft', serif; font-size: 14px; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0.4; }
  .stat-card.accent2::before { background: var(--accent2); }
  .stat-card.hit::before { background: var(--hit); }
  .stat-card.miss::before { background: var(--miss); }
  .stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-value.pct::after { content: '%'; font-size: 14px; color: var(--text-muted); margin-left: 2px; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 10px 16px; text-align: left; font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody td { padding: 10px 16px; border-bottom: 1px solid var(--text-dim); font-size: 12px; white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  .val-good { color: var(--hit); }
  .val-bad  { color: var(--miss); }
  .val-neutral { color: var(--accent); }
  .val-muted { color: var(--text-muted); }

  /* ── 外れ解剖 ── */
  #miss-analysis { display: none; margin-top: 32px; }
  #miss-analysis.visible { display: block; }

  .miss-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .miss-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .miss-card-title { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .miss-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--text-dim); font-size: 12px; }
  .miss-row:last-child { border-bottom: none; }
  .miss-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: var(--border); border-radius: 2px; }
  .miss-bar { height: 100%; background: var(--miss); border-radius: 2px; transition: width 0.4s ease; }
  .miss-pct { color: var(--miss); font-size: 11px; min-width: 36px; text-align: right; }
  .miss-label { color: var(--text); min-width: 60px; }
  .miss-count { color: var(--text-muted); font-size: 11px; min-width: 30px; }

  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  #reset-btn { display: none; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; margin-top: 8px; transition: all 0.2s; }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  #reset-btn.visible { display: inline-block; }
  .error-msg { color: var(--miss); font-size: 11px; margin-top: 8px; display: none; }
  .error-msg.visible { display: block; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 32px 0; }

  /* TAB */
  .face-tabs{display:none;margin-top:24px;border-bottom:1px solid var(--border);}
  .face-tabs.visible{display:flex;}
  .face-tab{padding:10px 24px;font-family:'Zen Antique Soft',serif;font-size:13px;color:var(--text-muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;letter-spacing:.2em;transition:all .2s;}
  .face-tab:hover{color:var(--text);}
  .face-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .face-tab.ura.active{color:var(--miss);border-bottom-color:var(--miss);}
  .face-panel{display:none;}
  .face-panel.active{display:block;}
  /* EV */
  .ev-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
  .ev-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px;position:relative;overflow:hidden;}
  .ev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.4;}
  .ev-card.pos::before{background:var(--hit);opacity:1;}
  .ev-card.neg::before{background:var(--miss);opacity:1;}
  .ev-label{font-size:10px;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}
  .ev-value{font-size:22px;font-weight:500;line-height:1;}
  .ev-sub{font-size:11px;color:var(--text-muted);margin-top:6px;}
  /* BEST */
  .best-banner{background:var(--surface2);border:1px solid var(--accent);border-radius:4px;padding:16px 20px;margin-bottom:24px;display:none;align-items:center;gap:16px;}
  .best-banner.visible{display:flex;}
  .best-icon{font-size:24px;}
  .best-main{flex:1;}
  .best-title{font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
  .best-val{font-size:20px;color:var(--accent);font-weight:500;}
  .best-detail{font-size:11px;color:var(--text-muted);margin-top:4px;}
  /* X POST */
  .x-box{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px;margin-bottom:24px;}
  .x-post-text{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:2px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;resize:vertical;min-height:160px;}
  .x-post-text:focus{outline:none;border-color:var(--accent);}
  .x-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .x-char{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .x-char.over{color:var(--miss);}
  .btn-x{background:transparent;border:1px solid var(--accent2);color:var(--accent2);padding:7px 16px;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;transition:all .2s;}
  .btn-x:hover{background:var(--accent2);color:var(--bg);}
  .btn-cp{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;transition:all .2s;}
  .btn-cp:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="title-jp">自在律　成績計算機</div>
    <div class="title-sub">Jizairitsu Performance Analyzer</div>
  </header>

  <div id="sheets-zone">
    <div class="sheets-title">── 成績データ読み込み</div>
    <input type="hidden" id="sheets-id-input" value="1S9U_AR4dM8tKTUTKx3_wAJBLW5x4zB3h7annjv7z8iw">
    <input type="hidden" id="sheets-name-input" value="データ入力">
    <button id="sheets-load-btn" onclick="loadSheet()">⊕ データを読み込む</button>
    <div id="sheets-status"></div>
  </div>

  <div id="file-info">
    <span class="file-name" id="file-name-text">—</span>
    <span class="file-rows" id="file-rows-text">—</span>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <button id="reset-btn" onclick="resetAll()">× リセット</button>

  <!-- 期間フィルタのみ -->
  <div id="period-filter">
    <span class="period-label">期間</span>
    <input type="date" id="f-date-from">
    <span class="period-sep">〜</span>
    <input type="date" id="f-date-to">
    <span id="period-count">— レース</span>
  </div>

  <!-- TAB -->
  <div class="face-tabs" id="face-tabs">
    <button class="face-tab active" onclick="switchFace('omote')">&#34920; &#8212;&#8212; &#21213;&#21106;&#12398;&#35352;&#37682;</button>
    <button class="face-tab ura" onclick="switchFace('ura')">&#35013; &#8212;&#8212; &#36020;&#12369;&#12398;&#35299;&#21560;</button>
  </div>
  <!-- omote -->
  <div id="face-omote" class="face-panel active">
    <div id="ev-section" style="display:none;margin-top:24px;">
      <div class="section-title">&#8212;&#8212; &#26399;&#24453;&#20516; &#12480;&#12483;&#12471;&#12517;&#12508;&#12540;&#12489;</div>
      <div class="ev-grid" id="ev-cards"></div>
      <div class="best-banner" id="best-banner">
        <div class="best-icon">&#127942;</div>
        <div class="best-main">
          <div class="best-title">&#26368;&#39640;&#37197;&#24403;</div>
          <div class="best-val" id="best-val">&#8212;</div>
          <div class="best-detail" id="best-detail">&#8212;</div>
        </div>
      </div>
      <div class="section-title">&#8212;&#8212; X &#25295;&#31295;&#25991; &#29983;&#25104;</div>
      <div class="x-box">
        <textarea class="x-post-text" id="x-post-text" readonly></textarea>
        <div class="x-actions">
          <button class="btn-x" onclick="openX()">&#120143; &#12391;&#25295;&#31295;</button>
          <button class="btn-cp" onclick="copyX()">&#12467;&#12500;&#12540;</button>
          <span class="x-char" id="x-char">0 / 280</span>
        </div>
      </div>
      <div class="divider"></div>
    </div>
  <!-- 成績サマリ -->
  <div id="results">
    <div class="section-title">── 総合成績</div>
    <div class="stats-grid" id="overview-stats"></div>
    <div class="divider"></div>
    <div class="section-title">── 令別　精度</div>
    <div class="stats-grid" id="rei-stats"></div>
    <div class="divider"></div>
    <div class="section-title">── 券種別　回収率</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>令</th><th>券種</th><th>点数</th><th>投資額</th><th>払戻合計</th><th>回収率</th><th>的中数</th></tr></thead>
        <tbody id="券種-tbody"></tbody>
      </table>
    </div>
    <div class="divider"></div>
    <div class="section-title">── 開催場別　的中率</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>開催場</th><th>レース数</th><th>的中数</th><th>的中率</th><th>晴天令T率</th><th>荒天令T率</th></tr></thead>
        <tbody id="venue-tbody"></tbody>
      </table>
    </div>
  </div>

  </div><!-- /face-omote -->
  <!-- ura -->
  <div id="face-ura" class="face-panel">
  <!-- 外れ解剖 -->
  <div id="miss-analysis">
    <div class="section-title">── 外れ解剖　─　負けに不思議の負けなし</div>
    <div class="miss-grid">
      <div class="miss-card">
        <div class="miss-card-title">令種　偏り</div>
        <div id="miss-rei"></div>
      </div>
      <div class="miss-card">
        <div class="miss-card-title">天雲指数帯　分布</div>
        <div id="miss-tenun"></div>
      </div>
      <div class="miss-card">
        <div class="miss-card-title">開催場　ランキング</div>
        <div id="miss-venue"></div>
      </div>
      <div class="miss-card">
        <div class="miss-card-title">決まり手　偏り</div>
        <div id="miss-kimari"></div>
      </div>
    </div>

  </div>
</div><!-- /face-ura -->

</div>
<script>
// ── State ────────────────────────────────────────────────────
let _allRows = [];

// ── Google Sheets API（APIキー方式） ─────────────────────────
const SHEETS_API_KEY = 'YOUR_API_KEY'; // ← 発行したAPIキーに差し替え

async function loadSheet() {
  const sid   = document.getElementById('sheets-id-input').value.trim();
  const sname = document.getElementById('sheets-name-input').value.trim() || 'データ入力';
  if (!sid) { setStatus('Spreadsheet IDを入力してください', 'err'); return; }

  document.getElementById('sheets-load-btn').disabled = true;
  setStatus('読み込み中...', 'loading');

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(sname)}?key=${SHEETS_API_KEY}`;

  try {
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'APIエラー');
    }
    const json = await res.json();
    const values = json.values;
    if (!values || values.length < 2) { setStatus('データが見つかりませんでした', 'err'); return; }

    const headers = values[0].map(h => String(h).trim());
    const rows = [];
    for (let i = 1; i < values.length; i++) {
      const r = values[i];
      if (!r || r.every(v => !v)) continue;
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = r[idx] !== undefined ? String(r[idx]).trim() : ''; });
      rows.push(obj);
    }
    if (rows.length === 0) { setStatus('有効なデータ行がありませんでした', 'err'); return; }

    _allRows = rows;
    setStatus('✓ ' + rows.length.toLocaleString() + ' レース読み込み完了', 'ok');
    document.getElementById('file-info').classList.add('visible');
    document.getElementById('file-name-text').textContent = sname;
    document.getElementById('file-rows-text').textContent = rows.length.toLocaleString() + ' レース';
    document.getElementById('sheets-zone').style.display = 'none';
    document.getElementById('period-filter').classList.add('visible');
    document.getElementById('period-count').textContent =
      rows.length.toLocaleString() + ' / ' + rows.length.toLocaleString() + ' レース';
    ['f-date-from','f-date-to'].forEach(id => {
      document.getElementById(id).addEventListener('change', onPeriodChange);
      document.getElementById(id).addEventListener('input', onPeriodChange);
    });
    renderAll(rows);
  } catch (err) {
    setStatus('読み込みエラー: ' + err.message, 'err');
  } finally {
    document.getElementById('sheets-load-btn').disabled = false;
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('sheets-status');
  el.textContent = msg;
  el.className = 'visible ' + type;
}

// ── 列名定数 ─────────────────────────────────────────────────
const COL = {
  date: 'レース日', venue: '開催場', tenun: '天雲指数',
  seiTF: '晴天令 T/F', koTF: '荒天令 T/F', hantei: '総合判定',
  kimari: '決まり手', odds3tan: '3連単オッズ', odds3fuku: '3連複オッズ', odds2tan: '2車単オッズ',
};

function toFloat(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
const get    = (row, key) => (row[key] || '').trim();
const isHit  = row => { const v = get(row, COL.hantei); return v.includes('的中') && !v.includes('不的中'); };
const isSeiT = row => get(row, COL.seiTF) === 'T';
const isKoT  = row => get(row, COL.koTF)  === 'T';

// ── 期間フィルタ ─────────────────────────────────────────────
function getFilteredRows() {
  const from = document.getElementById('f-date-from').value;
  const to   = document.getElementById('f-date-to').value;
  return _allRows.filter(row => {
    const d = get(row, COL.date).replace(/\//g, '-');
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  });
}

function onPeriodChange() {
  const rows = getFilteredRows();
  document.getElementById('period-count').textContent =
    `${rows.length.toLocaleString()} / ${_allRows.length.toLocaleString()} レース`;
  renderAll(rows);
}

// ── Analysis ─────────────────────────────────────────────────
function analyze(rows) {
  const total = rows.length;
  const empty = { payout:0, hitCount:0, invest:0, recovery:0 };
  if (total === 0) return { total:0, hits:0, hitRate:0, seiT:0, seiRate:0, koT:0, koRate:0, totalInvest:0, totalPayout:0, totalRecovery:0, kiken:{s3tan:empty,s3fuku:empty,k3fuku:empty,k2tan:empty}, venues:{} };

  const hits    = rows.filter(isHit).length;
  const seiTCnt = rows.filter(isSeiT).length;
  const koTCnt  = rows.filter(isKoT).length;
  const totalInvest = total * 1000;

  const calcKiken = (tfFn, oddsKey, investPerRace) => {
    let payout = 0, hitCount = 0;
    rows.forEach(row => { if (tfFn(row)) { const o = toFloat(get(row, oddsKey)); if (o > 0) { payout += o * 100; hitCount++; } } });
    const invest = total * investPerRace;
    return { payout, hitCount, invest, recovery: invest > 0 ? payout/invest*100 : 0 };
  };

  const s3tan  = calcKiken(isSeiT, COL.odds3tan,  400);
  const s3fuku = calcKiken(isSeiT, COL.odds3fuku, 100);
  const k3fuku = calcKiken(isKoT,  COL.odds3fuku, 200);
  const k2tan  = calcKiken(isKoT,  COL.odds2tan,  300);
  const totalPayout   = s3tan.payout + s3fuku.payout + k3fuku.payout + k2tan.payout;
  const totalRecovery = totalInvest > 0 ? totalPayout/totalInvest*100 : 0;

  const venueMap = {};
  rows.forEach(row => {
    const v = get(row, COL.venue) || '不明';
    if (!venueMap[v]) venueMap[v] = {total:0, hits:0, seiT:0, koT:0};
    venueMap[v].total++;
    if (isHit(row))  venueMap[v].hits++;
    if (isSeiT(row)) venueMap[v].seiT++;
    if (isKoT(row))  venueMap[v].koT++;
  });

  return { total, hits, hitRate: hits/total*100, seiT:seiTCnt, seiRate:seiTCnt/total*100, koT:koTCnt, koRate:koTCnt/total*100, totalInvest, totalPayout, totalRecovery, kiken:{s3tan,s3fuku,k3fuku,k2tan}, venues:venueMap };
}

// ── 外れ解剖集計 ─────────────────────────────────────────────
function analyzeMiss(rows) {
  const misses = rows.filter(r => !isHit(r));
  const total  = misses.length;
  if (total === 0) return null;

  // 令種
  const rei = { '晴天令T': 0, '荒天令T': 0, '晴天令F': 0, '荒天令F': 0 };
  misses.forEach(r => {
    if (isSeiT(r)) rei['晴天令T']++;
    else rei['晴天令F']++;
    if (isKoT(r))  rei['荒天令T']++;
    else rei['荒天令F']++;
  });

  // 天雲指数帯
  const tenunBands = { '0': 0, '33': 0, '67': 0, '100': 0, '他': 0 };
  misses.forEach(r => {
    const v = get(r, COL.tenun);
    if (['0','33','67','100'].includes(v)) tenunBands[v]++;
    else tenunBands['他']++;
  });

  // 開催場（上位8）
  const venueMap = {};
  misses.forEach(r => { const v = get(r, COL.venue) || '不明'; venueMap[v] = (venueMap[v] || 0) + 1; });
  const venues = Object.entries(venueMap).sort((a,b)=>b[1]-a[1]).slice(0, 8);

  // 決まり手（上位8）
  const kimariMap = {};
  misses.forEach(r => { const k = get(r, COL.kimari) || '不明'; kimariMap[k] = (kimariMap[k] || 0) + 1; });
  const kimari = Object.entries(kimariMap).sort((a,b)=>b[1]-a[1]).slice(0, 8);

  return { total, rei, tenunBands, venues, kimari };
}

// ── Render ───────────────────────────────────────────────────
function renderAll(rows) {
  const result = analyze(rows);
  renderStats(result);
  renderEV(result, rows);
  renderXPost(result, rows);
  const missData = analyzeMiss(rows);
  renderMissAnalysis(missData);
  window._lastMissData = missData;
  window._lastRows = rows;
  document.getElementById('face-tabs').classList.add('visible');
}

function renderStats(result) {
  const { total, hits, hitRate, seiT, seiRate, koT, koRate, totalInvest, totalPayout, totalRecovery, kiken, venues } = result;

  document.getElementById('overview-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">対象レース数</div><div class="stat-value">${total.toLocaleString()}</div><div class="stat-sub">レース</div></div>
    <div class="stat-card hit"><div class="stat-label">的中数</div><div class="stat-value">${hits}</div><div class="stat-sub">/ ${total} レース</div></div>
    <div class="stat-card hit"><div class="stat-label">的中率</div><div class="stat-value pct">${hitRate.toFixed(1)}</div><div class="stat-sub">総合判定</div></div>
    <div class="stat-card ${totalRecovery>=100?'hit':'miss'}"><div class="stat-label">総合回収率</div><div class="stat-value pct">${totalRecovery.toFixed(1)}</div><div class="stat-sub">${totalPayout.toLocaleString()}円 / ${totalInvest.toLocaleString()}円</div></div>`;

  document.getElementById('rei-stats').innerHTML = `
    <div class="stat-card accent2"><div class="stat-label">晴天令　的中数</div><div class="stat-value">${seiT}</div><div class="stat-sub">/ ${total} レース</div></div>
    <div class="stat-card accent2"><div class="stat-label">晴天令　精度</div><div class="stat-value pct">${seiRate.toFixed(1)}</div><div class="stat-sub">晴天令 T/F</div></div>
    <div class="stat-card"><div class="stat-label">荒天令　的中数</div><div class="stat-value">${koT}</div><div class="stat-sub">/ ${total} レース</div></div>
    <div class="stat-card"><div class="stat-label">荒天令　精度</div><div class="stat-value pct">${koRate.toFixed(1)}</div><div class="stat-sub">荒天令 T/F</div></div>`;

  const kikenRows = [
    {rei:'晴天令',type:'3連単',pts:4,data:kiken.s3tan},
    {rei:'晴天令',type:'3連複',pts:1,data:kiken.s3fuku},
    {rei:'荒天令',type:'3連複',pts:2,data:kiken.k3fuku},
    {rei:'荒天令',type:'2連単',pts:3,data:kiken.k2tan},
  ];
  document.getElementById('券種-tbody').innerHTML = kikenRows.map(({rei,type,pts,data}) => {
    const cls = data.recovery>=100?'val-good':data.recovery>=70?'val-neutral':'val-bad';
    return `<tr><td>${rei}</td><td>${type}</td><td class="val-muted">${pts}点</td><td class="val-muted">${data.invest.toLocaleString()}円</td><td>${data.payout.toLocaleString()}円</td><td class="${cls}">${data.recovery.toFixed(1)}%</td><td class="val-muted">${data.hitCount}回</td></tr>`;
  }).join('');

  const venueEntries = Object.entries(venues).sort((a,b)=>b[1].total-a[1].total);
  document.getElementById('venue-tbody').innerHTML = venueEntries.map(([venue,v]) => {
    const hr=(v.hits/v.total*100).toFixed(1), sr=(v.seiT/v.total*100).toFixed(1), kr=(v.koT/v.total*100).toFixed(1);
    const cls=parseFloat(hr)>=30?'val-good':parseFloat(hr)>=15?'val-neutral':'val-bad';
    return `<tr><td>${venue}</td><td class="val-muted">${v.total}</td><td class="val-muted">${v.hits}</td><td class="${cls}">${hr}%</td><td>${sr}%</td><td>${kr}%</td></tr>`;
  }).join('');

  document.getElementById('results').classList.add('visible');
  document.getElementById('reset-btn').classList.add('visible');
}

function missBarRow(label, count, max) {
  const pct = max > 0 ? (count / max * 100) : 0;
  return `<div class="miss-row">
    <span class="miss-label">${label}</span>
    <span class="miss-count">${count}</span>
    <div class="miss-bar-wrap"><div class="miss-bar" style="width:${pct.toFixed(1)}%"></div></div>
    <span class="miss-pct">${pct.toFixed(1)}%</span>
  </div>`;
}

function renderMissAnalysis(data) {
  if (!data || data.total === 0) {
    document.getElementById('miss-analysis').classList.remove('visible');
    return;
  }
  document.getElementById('miss-analysis').classList.add('visible');

  // 令種
  const reiMax = Math.max(...Object.values(data.rei));
  document.getElementById('miss-rei').innerHTML =
    Object.entries(data.rei).map(([k,v]) => missBarRow(k, v, reiMax)).join('');

  // 天雲指数帯
  const tenunMax = Math.max(...Object.values(data.tenunBands));
  document.getElementById('miss-tenun').innerHTML =
    Object.entries(data.tenunBands).map(([k,v]) => missBarRow(`指数 ${k}`, v, tenunMax)).join('');

  // 開催場
  const venueMax = data.venues[0] ? data.venues[0][1] : 1;
  document.getElementById('miss-venue').innerHTML =
    data.venues.map(([k,v]) => missBarRow(k, v, venueMax)).join('');

  // 決まり手
  const kimariMax = data.kimari[0] ? data.kimari[0][1] : 1;
  document.getElementById('miss-kimari').innerHTML =
    data.kimari.map(([k,v]) => missBarRow(k, v, kimariMax)).join('');
}

// ── File Handling ────────────────────────────────────────────



function resetAll() {
  _allRows = [];
  window._lastMissData = null;
  window._lastRows = null;
  document.getElementById('sheets-zone').style.display = '';
  document.getElementById('sheets-status').className = '';
  document.getElementById('sheets-status').textContent = '';
  document.getElementById('file-info').classList.remove('visible');
  document.getElementById('period-filter').classList.remove('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('miss-analysis').classList.remove('visible');
  document.getElementById('reset-btn').classList.remove('visible');
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('f-date-from').value = '';
  document.getElementById('f-date-to').value = '';
  document.getElementById('face-tabs').classList.remove('visible');
  document.getElementById('ev-section').style.display = 'none';
  document.getElementById('best-banner').classList.remove('visible');
  document.getElementById('x-post-text').value = '';
  switchFace('omote');
}

// ── TAB ────────────────────────────────────────────────────
function switchFace(face) {
  document.getElementById('face-omote').classList.toggle('active', face === 'omote');
  document.getElementById('face-ura').classList.toggle('active', face === 'ura');
  var tabs = document.querySelectorAll('.face-tab');
  tabs[0].classList.toggle('active', face === 'omote');
  tabs[1].classList.toggle('active', face === 'ura');
}

// ── EV DASHBOARD ───────────────────────────────────────────
function renderEV(result, rows) {
  var total = result.total, hits = result.hits, hitRate = result.hitRate;
  var totalInvest = result.totalInvest, totalPayout = result.totalPayout;
  var kiken = result.kiken;
  var ev = totalPayout - totalInvest;
  var evPerRace = total > 0 ? Math.round(ev / total) : 0;
  var seiPayout = kiken.s3tan.payout + kiken.s3fuku.payout;
  var koPayout  = kiken.k3fuku.payout + kiken.k2tan.payout;
  var seiInvest = total * 500, koInvest = total * 500;
  var seiEV = seiPayout - seiInvest, koEV = koPayout - koInvest;

  // TT/TF/FT/FF
  var pat = {TT:0, TF:0, FT:0, FF:0};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var s = isSeiT(r), k = isKoT(r);
    if (s && k) pat.TT++; else if (s) pat.TF++; else if (k) pat.FT++; else pat.FF++;
  }

  function evCard(cls, label, val, sub) {
    return '<div class="ev-card ' + cls + '">' +
      '<div class="ev-label">' + label + '</div>' +
      '<div class="ev-value" style="color:' + (cls==='pos'?'var(--hit)':cls==='neg'?'var(--miss)':'var(--text)') + '">' + val + '</div>' +
      '<div class="ev-sub">' + sub + '</div></div>';
  }

  var sign = ev >= 0 ? '+' : '';
  var sSign = seiEV >= 0 ? '+' : '';
  var kSign = koEV >= 0 ? '+' : '';
  var ffPct = total > 0 ? (pat.FF / total * 100).toFixed(1) : '0.0';
  var sRec = seiInvest > 0 ? (seiPayout / seiInvest * 100).toFixed(1) : '0.0';
  var kRec = koInvest  > 0 ? (koPayout  / koInvest  * 100).toFixed(1) : '0.0';

  document.getElementById('ev-cards').innerHTML =
    evCard(ev>=0?'pos':'neg', 'JUNNSONEKI', sign + ev.toLocaleString() + 'en', '1race heikin ' + (evPerRace>=0?'+':'') + evPerRace.toLocaleString() + 'en') +
    evCard(seiEV>=0?'pos':'neg', 'SEITEN-REI KOKEN', sSign + seiEV.toLocaleString() + 'en', 'kaishuritsu ' + sRec + '%') +
    evCard(koEV>=0?'pos':'neg', 'KOTEN-REI KOKEN', kSign + koEV.toLocaleString() + 'en', 'kaishuritsu ' + kRec + '%') +
    evCard('', 'REI PATTERN', 'TT:' + pat.TT + ' TF:' + pat.TF + ' FT:' + pat.FT + ' FF:' + pat.FF, 'FF-ritsu ' + ffPct + '%');

  // BEST HIT
  var bestRow = null, bestOdds = 0;
  for (var j = 0; j < rows.length; j++) {
    var rr = rows[j];
    if (!isSeiT(rr) && !isKoT(rr)) continue;
    var o = Math.max(toFloat(get(rr, COL.odds3tan)), toFloat(get(rr, COL.odds3fuku)), toFloat(get(rr, COL.odds2tan)));
    if (o > bestOdds) { bestOdds = o; bestRow = rr; }
  }
  if (bestRow) {
    document.getElementById('best-banner').classList.add('visible');
    var payout = Math.round(bestOdds * 100);
    document.getElementById('best-val').textContent = bestOdds.toFixed(1) + ' bai / ' + payout.toLocaleString() + ' en';
    document.getElementById('best-detail').textContent = get(bestRow, COL.date) + ' ' + get(bestRow, COL.venue);
  }

  document.getElementById('ev-section').style.display = 'block';
}

// ── X POST ──────────────────────────────────────────────────
function renderXPost(result, rows) {
  var total = result.total, hits = result.hits;
  var hitRate = result.hitRate, totalRecovery = result.totalRecovery;
  var ev = result.totalPayout - result.totalInvest;
  var from = document.getElementById('f-date-from').value;
  var to   = document.getElementById('f-date-to').value;
  var period = (from || to) ? (from || '') + '~' + (to || '') : 'zentai';
  var sign = ev >= 0 ? '+' : '-';
  var bestOdds = 0, bestDate = '', bestVenue = '';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (!isSeiT(r) && !isKoT(r)) continue;
    var o = Math.max(toFloat(get(r, COL.odds3tan)), toFloat(get(r, COL.odds3fuku)), toFloat(get(r, COL.odds2tan)));
    if (o > bestOdds) { bestOdds = o; bestDate = get(r, COL.date); bestVenue = get(r, COL.venue); }
  }
  var lines = [
    '[Jizairitsu ' + period + ' seiseki]',
    '',
    total + ' races',
    'tekichu-ritsu ' + hitRate.toFixed(1) + '% (' + hits + '/' + total + ')',
    'kaishu-ritsu ' + totalRecovery.toFixed(1) + '%',
    'soneki ' + sign + Math.abs(ev).toLocaleString() + 'en'
  ];
  if (bestOdds > 0) {
    lines.push('');
    lines.push('[saikou haito]');
    lines.push(bestDate + ' ' + bestVenue);
    lines.push(bestOdds.toFixed(1) + ' bai / ' + Math.round(bestOdds*100).toLocaleString() + ' en');
  }
  lines.push('');
  lines.push('#keirin #Jizairitsu');
  var post = lines.join('\n');
  var ta = document.getElementById('x-post-text');
  var cc = document.getElementById('x-char');
  ta.value = post;
  cc.textContent = post.length + ' / 280';
  cc.classList.toggle('over', post.length > 280);
}

function openX() {
  var t = document.getElementById('x-post-text').value;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(t), '_blank');
}
function copyX() {
  var t = document.getElementById('x-post-text').value;
  navigator.clipboard.writeText(t).then(function() {
    var b = document.querySelector('.btn-cp');
    b.textContent = 'COPIED';
    setTimeout(function(){ b.textContent = 'COPY'; }, 1500);
  });
}

</script>
