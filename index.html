<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競輪補正計算機</title>
<style>
  body { font-family: sans-serif; margin: 10px; font-size: 16px; }
  select, input, button { font-size: 16px; margin: 5px 0; width: 100%; padding: 8px; }
  .output { margin-top: 20px; }
  .score, .bets { margin-bottom: 15px; }
</style>
</head>
<body>

<h2>競輪補正計算機</h2>

<label>場選択</label>
<select id="venueSelect"></select>

<label>時間帯</label>
<select id="timeSelect">
  <option value="morning">モーニング</option>
  <option value="day">デイ</option>
  <option value="night">ナイター</option>
  <option value="midnight">ミッドナイト</option>
</select>

<label>風向き</label>
<select id="windSelect"></select>

<label>選手番号と脚質（例: 1:逃げ,2:差し,3:捲り,4:マーク）</label>
<input type="text" id="playersInput" placeholder="1:逃げ,2:差し,...">

<button id="calcBtn">計算する</button>

<div class="output">
  <div class="score" id="scoreOutput"></div>
  <div class="bets" id="betsOutput"></div>
</div>

<script>
const bankdata = {
"函館": {"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"バック追い風":1.05}},
"青森": {"length":333,"keirin_bias":{"逃げ":1.05,"捲り":1.0,"差し":0.95,"マーク":1.0},"wind_or_position":{}},
"盛岡": {"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"いわき平":{"length":333,"keirin_bias":{"逃げ":0.95,"捲り":1.05,"差し":1.05,"マーク":1.0},"wind_or_position":{}},
"宇都宮":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.0,"差し":1.05,"マーク":1.0},"wind_or_position":{}},
"立川":{"length":400,"keirin_bias":{"逃げ":0.95,"捲り":1.0,"差し":1.05,"マーク":1.0},"wind_or_position":{"バック向かい風":0.9}},
"松戸":{"length":333,"keirin_bias":{"逃げ":1.05,"捲り":1.05,"差し":0.95,"マーク":1.0},"wind_or_position":{}},
"平塚":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"川崎":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"バック追い風":1.05,"4コーナー外伸び":1.05}},
"小田原":{"length":333,"keirin_bias":{"逃げ":1.1,"捲り":0.9,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"伊東":{"length":333,"keirin_bias":{"逃げ":0.95,"捲り":1.05,"差し":1.05,"マーク":1.0},"wind_or_position":{}},
"静岡":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"16時以降風向き変化":1.05}},
"富山":{"length":333,"keirin_bias":{"逃げ":1.05,"捲り":1.0,"差し":1.0,"マーク":1.0},"wind_or_position":{"夏追い風":1.05}},
"大垣":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"岐阜":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"名古屋":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"豊橋":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"松阪":{"length":400,"keirin_bias":{"逃げ":0.95,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"四日市":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.0,"差し":1.05,"マーク":1.0},"wind_or_position":{"第4コーナー外伸び":1.05}},
"福井":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.0,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"奈良":{"length":333,"keirin_bias":{"逃げ":1.05,"捲り":1.0,"差し":0.95,"マーク":1.0},"wind_or_position":{"バック向かい風":0.95}},
"岸和田":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.0,"差し":1.0,"マーク":1.0},"wind_or_position":{"横風":0.95}},
"玉野":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"バック向かい風":0.95}},
"防府":{"length":333,"keirin_bias":{"逃げ":1.0,"捲り":1.0,"差し":1.0,"マーク":1.0},"wind_or_position":{"西風":0.95}},
"小松島":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"バック風":0.95}},
"高知":{"length":500,"keirin_bias":{"逃げ":1.05,"捲り":1.0,"差し":0.95,"マーク":1.0},"wind_or_position":{}},
"小倉":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.05,"マーク":1.0},"wind_or_position":{}},
"久留米":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}},
"別府":{"length":400,"keirin_bias":{"逃げ":0.95,"捲り":1.05,"差し":1.05,"マーク":1.0},"wind_or_position":{"バック向かい風":0.9}},
"武雄":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{"追い風ホーム側":1.05}},
"佐世保":{"length":400,"keirin_bias":{"逃げ":1.05,"捲り":1.0,"差し":1.0,"マーク":1.0},"wind_or_position":{"海風":0.95}},
"熊本":{"length":400,"keirin_bias":{"逃げ":1.0,"捲り":1.05,"差し":1.0,"マーク":1.0},"wind_or_position":{}}
};

const venueSelect = document.getElementById('venueSelect');
const windSelect = document.getElementById('windSelect');
Object.keys(bankdata).forEach(v=>{
  const opt = document.createElement('option');
  opt.value = v;
  opt.textContent = v;
  venueSelect.appendChild(opt);
});

function updateWind() {
  const venue = venueSelect.value;
  windSelect.innerHTML = '';
  const winds = bankdata[venue].wind_or_position;
  if(Object.keys(winds).length===0) {
    ['東','西','南','北'].forEach(dir=>{
      const opt = document.createElement('option'); opt.value=dir; opt.textContent=dir;
      windSelect.appendChild(opt);
    });
  } else {
    Object.keys(winds).forEach(w=>{
      const opt = document.createElement('option'); opt.value=w; opt.textContent=w;
      windSelect.appendChild(opt);
    });
  }
}
venueSelect.addEventListener('change', updateWind);
updateWind();

document.getElementById('calcBtn').addEventListener('click', ()=>{
  const venue = venueSelect.value;
  const time = document.getElementById('timeSelect').value;
  const wind = windSelect.value;
  const playersStr = document.getElementById('playersInput').value.trim();
  if(!playersStr) return alert("選手入力してください");
  const players = {};
  playersStr.split(',').forEach(p=>{
    const [num,pos] = p.split(':');
    players[Number(num)] = pos;
  });

  const venueData = bankdata[venue];
  const windBias = venueData.wind_or_position[wind] || 1.0;
  const timeBias = {morning:1.0,day:1.05,night:1.1,midnight:1.0}[time];

  const scores = {};
  Object.entries(players).forEach(([num,pos])=>{
    const bias = venueData.keirin_bias[pos] || 1.0;
    const base = 80 + Number(num);
    scores[num] = base * bias * windBias * timeBias;
  });

  const ranking = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top3 = ranking.slice(0,3).map(e=>e[0]);
  const top4 = ranking.slice(0,4).map(e=>e[0]);

  document.getElementById('scoreOutput').innerHTML = "<b>補正後スコアランキング</b><br>" + ranking.map(e=>`選手${e[0]}: ${e[1].toFixed(2)}`).join('<br>');
  document.getElementById('betsOutput').innerHTML = `<b>買い目</b><br>三連単12点: ${top3.join('-')}<br>三連複4点: ${top4.join(',')}`;
});
</script>

</body>
</html>
