<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華耀天輪 真・自在律 V6.0 - Mobile</title>
    <style>
        /* モバイル最適化CSS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background-color: #f4f4f9; color: #333; }
        .container { width: 100%; max-width: 600px; margin: auto; background-color: #fff; padding: 15px; border-radius: 0; box-shadow: none; }
        h1 { font-size: 1.5em; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 5px; margin-top: 10px; }
        h2 { font-size: 1.2em; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 3px; margin-top: 20px; }
        .input-group, .result-section { margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background-color: #fafafa; }
        
        /* 縦積み化 */
        .input-item { margin-bottom: 15px; }
        .input-item label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input[type="number"], input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 3px; }

        /* テーブルのモバイル対応 (横スクロール可能にする) */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 600px; min-width: 600px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 6px 4px; text-align: center; font-size: 0.8em; }
        th { background-color: #3498db; color: white; }
        td select { width: auto; min-width: 40px; }
        td input[type="number"] { width: 60px; }
        td input[type="text"] { width: 40px; }

        /* その他UI要素 */
        .debug-log { background-color: #2c3e50; color: #ecf0f1; padding: 10px; height: 120px; overflow-y: scroll; font-family: 'Courier New', Courier, monospace; border-radius: 5px; font-size: 0.75em; }
        .recommendation { padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px; font-size: 0.9em; }
        #seitenrei-output { background-color: #e8f8f5; border-left: 5px solid #1abc9c; }
        #koutenrei-output { background-color: #fbecec; border-left: 5px solid #e74c3c; }
        .scenario-detail { border: 1px dashed #95a5a6; padding: 10px; margin-top: 15px; border-radius: 5px; }
        .scenario-detail h4 { font-size: 1em; margin: 0 0 10px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px;}
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>華耀天輪 真・自在律 V6.0</h1>

    <h2>🛠️ デバッグ・処理ログ</h2>
    <div class="debug-log" id="debug-log">
        [TOOL START] ツール起動。すべての係数とロジックを読み込みました。<br>
        [INFO] bankdata.jsonの読み込みを待機しています...
    </div>

    <h2>🎛️ レース/選手情報入力</h2>
    <div class="input-group">
        
        <div class="input-item">
            <label for="race-type"><strong>レースタイプ/級班:</strong></label>
            <select id="race-type">
                <option value="girls">🚴‍♀️ ガールズ競輪</option>
                <option value="s-kyu">🏆 S級</option>
                <option value="a-kyu">A級</option>
                <option value="a-chal">A級チャレンジ</option>
            </select>
        </div>

        <div class="input-item">
            <label for="bank-name">バンク名:</label>
            <select id="bank-name">
                <option value="函館">函館</option>
                <option value="青森">青森</option>
                <option value="いわき平">いわき平</option>
                <option value="取手">取手</option>
                <option value="宇都宮">宇都宮</option>
                <option value="西武園">西武園</option>
                <option value="京王閣">京王閣</option>
                <option value="立川">立川</option>
                <option value="松戸">松戸</option>
                <option value="平塚">平塚</option>
                <option value="川崎">川崎</option>
                <option value="小田原">小田原</option>
                <option value="伊東">伊東</option>
                <option value="静岡">静岡</option>
                <option value="富山">富山</option>
                <option value="大垣">大垣</option>
                <option value="岐阜">岐阜</option>
                <option value="名古屋">名古屋</option>
                <option value="豊橋">豊橋</option>
                <option value="松阪">松阪</option>
                <option value="四日市">四日市</option>
                <option value="福井">福井</option>
                <option value="奈良">奈良</option>
                <option value="岸和田">岸和田</option>
                <option value="玉野">玉野</option>
                <option value="防府">防府</option>
                <option value="小松島">小松島</option>
                <option value="高知">高知</option>
                <option value="小倉">小倉</option>
                <option value="久留米">久留米</option>
                <option value="別府">別府</option>
                <option value="武雄">武雄</option>
                <option value="佐世保">佐世保</option>
                <option value="熊本">熊本</option>
            </select>
        </div>

        <div class="input-item">
            <label for="wind-direction">特殊条件 (風/位置):</label>
            <select id="wind-direction">
                <option value="">なし (無補正)</option>
                <option value="バック追い風">バック追い風</option>
                <option value="向かい風">向かい風</option>
                <option value="競りイン優勢">競りイン優勢</option>
                <option value="風向き変化">風向き変化</option>
                <option value="バック向かい風">バック向かい風</option>
                <option value="4コーナー外伸び">4コーナー外伸び</option>
                <option value="16時以降風向き変化">16時以降風向き変化</option>
                <option value="夏追い風">夏追い風</option>
                <option value="第4コーナー外伸び">第4コーナー外伸び</option>
                <option value="横風">横風</option>
                <option value="西風">西風</option>
                <option value="バック風">バック風</option>
                <option value="追い風ホーム側">追い風ホーム側</option>
                <option value="海風">海風</option>
            </select>
        </div>


        <p><strong>選手データ入力 (7名)</strong></p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>脚質</th>
                        <th>得点 (R)</th>
                        <th>W印</th>
                        <th>直近3走</th>
                        <th>S/B 1位</th>
                    </tr>
                </thead>
                <tbody id="player-data">
                    <tr><td>1</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="1" class="score" value="105.50"></td><td><input type="text" data-id="1" class="wmark" value="◎"></td><td><input type="text" data-id="1" class="recent" value="111"></td><td><input type="checkbox" data-id="1" class="sb1"></td></tr>
                    <tr><td>2</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="2" class="score" value="103.20"></td><td><input type="text" data-id="2" class="wmark" value="〇"></td><td><input type="text" data-id="2" class="recent" value="211"></td><td><input type="checkbox" data-id="2" class="sb1"></td></tr>
                    <tr><td>3</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="3" class="score" value="101.80"></td><td><input type="text" data-id="3" class="wmark" value="△"></td><td><input type="text" data-id="3" class="recent" value="444"></td><td><input type="checkbox" data-id="3" class="sb1" checked></td></tr>
                    <tr><td>4</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="4" class="score" value="99.50"></td><td><input type="text" data-id="4" class="wmark" value="無"></td><td><input type="text" data-id="4" class="recent" value="333"></td><td><input type="checkbox" data-id="4" class="sb1"></td></tr>
                    <tr><td>5</td><td><select><option value="両">両</option><option value="自">自</option><option value="追">追</option></select></td><td><input type="number" data-id="5" class="score" value="98.00"></td><td><input type="text" data-id="5" class="wmark" value="無"></td><td><input type="text" data-id="5" class="recent" value="555"></td><td><input type="checkbox" data-id="5" class="sb1"></td></tr>
                    <tr><td>6</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="6" class="score" value="97.20"></td><td><input type="text" data-id="6" class="wmark" value="無"></td><td><input type="text" data-id="6" class="recent" value="666"></td><td><input type="checkbox" data-id="6" class="sb1"></td></tr>
                    <tr><td>7</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="7" class="score" value="95.10"></td><td><input type="text" data-id="7" class="wmark" value="無"></td><td><input type="text" data-id="7" class="recent" value="777"></td><td><input type="checkbox" data-id="7" class="sb1"></td></tr>
                </tbody>
            </table>
        </div>


        <div class="input-item">
            <label for="line-input"><strong>全体並び:</strong> (例: 123,45,67 または 1,2,3,4,5,6,7)</label>
            <input type="text" id="line-input" value="1,2,3,4,5,6,7">
        </div>
        
        <button onclick="calculatePrediction()">🚀 予想を計算 (実行)</button>
    </div>

    <h2>📊 予想結果・推奨買い目</h2>
    <div class="result-section">
        
        <p><strong>連係評価:</strong> <span id="line-strength">計算結果待ち...</span></p>

        <h3>☀️ 晴天令 (安定推奨)</h3>
        <div class="recommendation" id="seitenrei-output">
            計算結果待ち...
        </div>

        <h3>⛈️ 荒天令 (高配当狙い)</h3>
        <div class="recommendation" id="koutenrei-output">
            計算結果待ち...
        </div>

        <h3>展開別シミュレーション詳細</h3>
        
        <div id="scenario-output">
            </div>

    </div>
</div>

<script src="keirin_logic_v6.0.js"></script>
</body>
</html>
