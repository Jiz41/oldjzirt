<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Race Calculator</title>
<style>
body { font-family: sans-serif; margin: 20px; }
input, select { margin: 5px; }
table { border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #333; padding: 5px; text-align: center; }
</style>
</head>
<body>
<h2>Race Calculator</h2>

<div>
<label>場名：
<select id="trackSelect"></select>
</label>
<label>風向：
<select id="windSelect">
<option value="0">なし</option>
<option value="1">追い風</option>
<option value="-1">向かい風</option>
</select>
</label>
<label>時間帯：
<select id="timeSelect">
<option value="day">デイ</option>
<option value="night">ナイター</option>
<option value="midnight">ミッドナイト</option>
</select>
</label>
</div>

<h3>選手データ</h3>
<table>
<tr><th>選手</th><th>脚質</th><th>得点</th></tr>
<tr><td>1</td><td><input type="text" id="style1" size="4"></td><td><input type="number" id="score1" size="4"></td></tr>
<tr><td>2</td><td><input type="text" id="style2" size="4"></td><td><input type="number" id="score2" size="4"></td></tr>
<tr><td>3</td><td><input type="text" id="style3" size="4"></td><td><input type="number" id="score3" size="4"></td></tr>
<tr><td>4</td><td><input type="text" id="style4" size="4"></td><td><input type="number" id="score4" size="4"></td></tr>
<tr><td>5</td><td><input type="text" id="style5" size="4"></td><td><input type="number" id="score5" size="4"></td></tr>
<tr><td>6</td><td><input type="text" id="style6" size="4"></td><td><input type="number" id="score6" size="4"></td></tr>
<tr><td>7</td><td><input type="text" id="style7" size="4"></td><td><input type="number" id="score7" size="4"></td></tr>
</table>

<div>
<label>並び（カンマ区切り）：
<input type="text" id="orderInput" size="20" value="123,45,6,7">
</label>
</div>

<button onclick="calc()">計算</button>

<h3>結果</h3>
<div id="results"></div>

<script>
let bankData;

fetch('bankdata.json')
.then(r => r.json())
.then(data => {
    bankData = data;
    const trackSelect = document.getElementById('trackSelect');
    data.tracks.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = t.name;
        trackSelect.appendChild(opt);
    });
});

function calc() {
    const track = document.getElementById('trackSelect').value;
    const wind = parseInt(document.getElementById('windSelect').value);
    const time = document.getElementById('timeSelect').value;

    let players = [];
    for(let i=1;i<=7;i++){
        players.push({
            id:i,
            style: document.getElementById('style'+i).value,
            baseScore: parseFloat(document.getElementById('score'+i).value)
        });
    }

    // 補正適用
    const trackData = bankData.tracks.find(t => t.name===track);
    players.forEach(p=>{
        let mod = 1;
        if(trackData && trackData.corrections){
            const sMod = trackData.corrections.style[p.style] || 1;
            const wMod = wind!==0 ? trackData.corrections.wind[wind] || 1 : 1;
            const tMod = trackData.corrections.time[time] || 1;
            mod = sMod * wMod * tMod;
        }
        p.finalScore = p.baseScore * mod;
    });

    // ランキング
    players.sort((a,b)=>b.finalScore-a.finalScore);

    // 並び取得
    const orderStr = document.getElementById('orderInput').value;
    const orderGroups = orderStr.split(',').map(g=>g.split('').map(Number));

    // 三連単12点
    const tria = [];
    for(let i=0;i<orderGroups.length;i++){
        for(let j=0;j<orderGroups[i].length;j++){
            for(let k=i+1;k<orderGroups.length;k++){
                for(let l=0;l<orderGroups[k].length;l++){
                    for(let m=k+1;m<orderGroups.length;m++){
                        for(let n=0;n<orderGroups[m].length;n++){
                            tria.push([orderGroups[i][j],orderGroups[k][l],orderGroups[m][n]]);
                            if(tria.length>=12) break;
                        }
                        if(tria.length>=12) break;
                    }
                    if(tria.length>=12) break;
                }
                if(tria.length>=12) break;
            }
            if(tria.length>=12) break;
        }
        if(tria.length>=12) break;
    }

    // 三連複4点（組み合わせ3つ選ぶだけ）
    const triR = [];
    for(let i=0;i<orderGroups.length;i++){
        for(let j=i+1;j<orderGroups.length;j++){
            for(let k=j+1;k<orderGroups.length;k++){
                triR.push([orderGroups[i][0],orderGroups[j][0],orderGroups[k][0]]);
                if(triR.length>=4) break;
            }
            if(triR.length>=4) break;
        }
        if(triR.length>=4) break;
    }

    // 表示
    let html = '<h4>総合スコアランキング</h4><table><tr><th>選手</th><th>得点</th></tr>';
    players.forEach(p=>{
        html += `<tr><td>${p.id}</td><td>${p.finalScore.toFixed(2)}</td></tr>`;
    });
    html += '</table>';

    html += '<h4>三連単12点</h4><pre>'+tria.map(a=>a.join('-')).join('\n')+'</pre>';
    html += '<h4>三連複4点</h4><pre>'+triR.map(a=>a.join('-')).join('\n')+'</pre>';

    document.getElementById('results').innerHTML = html;
}
</script>
</body>
</html>
