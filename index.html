<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>真・自在律 v3.1（最終版）</title>
    <style>
        /* 基本スタイル */
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1, h2, h3 { color: #333; border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #e9e9e9; }
        input[type="number"], input[type="text"] { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="checkbox"] { width: 20px; height: 20px; } 
        /* ライン評価のカラースタイル */
        .line-strongest { background-color: #D9534F; color: white; font-weight: bold; } /* 超特級 */
        .line-strong { background-color: #F0AD4E; color: white; font-weight: bold; } /* 特級 */
        .line-high { background-color: #F0AD4E; color: black; } /* 上級 */
        .line-medium-high { background-color: #F7E79B; color: black; } /* 中上級 */
        .line-medium { background-color: #FFFFE0; color: black; } /* 標準 */
        .line-medium-low { background-color: #D4EDDA; color: black; } /* 中下級 */
        .line-low { background-color: #5CB85C; color: white; } /* 下級 */
        .line-weak { background-color: #5BC0DE; color: white; } /* 劣級 */
        .line-weakest { background-color: #0275D8; color: white; } /* 最劣級 */
        .single-rider { background-color: #6C757D; color: white; font-style: italic; } /* 単騎 */
        .result-best { background-color: #D9534F; color: white; font-weight: bold; } /* 買い目強調 */
        /* ボタンとアラート */
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .debug-info { margin-top: 20px; padding: 10px; border: 1px dashed #aaa; background-color: #f9f9f9; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>真・自在律 v3.1</h1>
    <p>競走得点、ライン連係、W印、展開、S/B積極性から総合スコアを算出します。</p>

    <h2>🚴 レース基本情報入力</h2>
    <p>※ 選手情報はID順に入力してください。</p>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>脚質<br>(S/M/K/O)</th>
                <th>競走得点</th>
                <th>直近着順<br>(過去3走平均)</th>
                <th>W印<br>(◎/〇/△/✕)</th>
                <th>S回数1位</th>
                <th>B回数1位</th>
            </tr>
        </thead>
        <tbody id="riderInputBody">
            </tbody>
    </table>

    <p>
        <strong>ライン並び:</strong> <input type="text" id="lineup" placeholder="例: 1-2-3, 4-5, 6, 7" style="width: 250px;">
        <strong>展開シナリオ:</strong> <select id="scenario">
            <option value="default">中立</option>
            <option value="senko">先行有利</option>
            <option value="makuri">捲り有利</option>
            <option value="sashi">差し有利</option>
        </select>
        <strong>バンク脚質補正:</strong> <input type="number" id="bankBias" value="1.00" step="0.01">
        <strong>レース種別:</strong> <select id="raceType">
            <option value="man">男子（S/A級）</option>
            <option value="girl">ガールズ</option>
        </select>
    </p>
    
    <div id="raceLevelInfo" style="margin-top: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

    <button onclick="calculateScore('normal')">予想スコア計算 (晴天令)</button>
    <button onclick="calculateScore('filter')">予想スコア計算 (荒天令W印フィルタ)</button>

    <div id="resultsArea" style="margin-top: 30px;">

        <hr>
        <div id="lineRankingArea">
            <h3>🏆 ライン総合評価（連係信頼度）</h3>
        </div>
        <hr>
        
        <h2>📊 スコア・買い目シミュレーション結果</h2>
        <p id="currentMode"></p>
        <table id="scoreTable"></table>


        <h3>🛒 予想買い目（三連単フォーメーション）</h3>
        <table id="predictionTable"></table>
    </div>

    <div class="debug-info">
        <h3>🔧 デバッグ/検証情報</h3>
        <pre id="debugOutput"></pre>
    </div>

</div>

<script>
    // ====================================================================
    // 1. 定数と初期データ設定
    // ====================================================================

    const RIDER_COUNT = 7;
    
    // W印係数（最終確定値：◎:1.10, 〇:1.07, △:1.03, ✕/無:1.01）
    const W_MARK_COEFS = { '◎': 1.10, '〇': 1.07, '△': 1.03, '✕': 1.01, '無': 1.01 }; 

    // ポジションボーナス (基本的な有利性: 2番手が最大)
    const POSITION_BONUS = { 1: 1.00, 2: 1.06, 3: 1.03, 4: 1.00, 5: 0.98, 6: 0.97, 7: 0.96 };
    // 脚質分類
    const JIRIKI_LEGS = ['S', 'M']; 
    const OIKOMI_LEGS = ['K', 'O']; 

    // 単騎ボーナス (自由度ボーナス)
    const SOLO_BONUS = 1.02; 
    
    // S/Bボーナス係数 (軽め)
    const S_BONUS = 1.005; 
    const B_BONUS = 1.005;

    // 画面生成
    document.addEventListener('DOMContentLoaded', () => {
        const inputBody = document.getElementById('riderInputBody');
        for (let i = 1; i <= RIDER_COUNT; i++) {
            inputBody.innerHTML += `
                <tr data-rider-id="${i}">
                    <td>${i}</td>
                    <td><input type="text" class="leg-type" data-id="${i}" value="" style="width: 30px;"></td>
                    <td><input type="number" class="score" data-id="${i}" value="90.00" step="0.01"></td>
                    <td><input type="number" class="recent-rank" data-id="${i}" value="3.5" step="0.1"></td>
                    <td><input type="text" class="w-mark" data-id="${i}" value="無" style="width: 30px;"></td>
                    <td><input type="checkbox" class="s-rank-1" data-id="${i}"></td>
                    <td><input type="checkbox" class="b-rank-1" data-id="${i}"></td>
                </tr>
            `;
        }
    });

    // ====================================================================
    // 2. ロジック計算ヘルパー関数
    // ====================================================================

    /**
     * レースの平均得点に基づき、動的な結束力係数 k を決定する。
     */
    function getDynamicEnduranceK(allScores) {
        if (allScores.length === 0) return { k: 0.005, level: 'データ不足' };
        
        const sum = allScores.reduce((a, b) => a + b, 0);
        const meanScore = sum / allScores.length;

        let k;
        let level;

        if (meanScore < 85.00) {
            k = 0.003; // A級チャレンジ想定 (緩い)
            level = 'A級チャレンジレベル (k=0.003)';
        } else if (meanScore < 100.00) {
            k = 0.005; // A級/S級予選想定 (標準)
            level = 'A級/S級予選レベル (k=0.005)';
        } else {
            k = 0.007; // S級特選想定 (厳しい)
            level = 'S級特選レベル (k=0.007)';
        }
        
        return { k: k, level: level, mean: meanScore.toFixed(2) };
    }


    /**
     * ラインの得点バラツキに基づき、結束力係数 C_End を計算する。
     */
    function calculateEnduranceCoef(scores, k) {
        if (scores.length <= 1) return 1.00;

        const sum = scores.reduce((a, b) => a + b, 0);
        const mean = sum / scores.length;
        
        const variance = scores.reduce((sum, score) => sum + Math.pow(score - mean, 2), 0) / scores.length;
        const stdDev = Math.sqrt(variance);

        let C_End = 1.05 - k * stdDev;
        return Math.max(0.95, C_End); 
    }

    /**
     * ラインの脚質構成に基づき、整合性係数 C_Leg を計算する。
     */
    function calculateLegIntegrity(legs) {
        if (legs.length <= 1) return 1.00;

        const jirikiCount = legs.filter(l => JIRIKI_LEGS.includes(l.toUpperCase())).length;
        const total = legs.length;

        if (total === 3) {
            if (jirikiCount === 1) return 1.03; 
            if (jirikiCount === 2) return 1.01; 
            if (jirikiCount === 3) return 0.97; 
            if (jirikiCount === 0) return 0.98;
        } else if (total === 2) {
            if (jirikiCount === 1) return 1.02;
            if (jirikiCount === 2) return 0.99; 
            if (jirikiCount === 0) return 1.00;
        }
        return 1.00;
    }

    /**
     * ライン総合評価 (色と文字) を計算する。
     */
    function getLineGrade(avgScore, C_End, C_Leg) {
        const totalScore = avgScore * C_End * C_Leg;
        
        const baseScore = 95.00 * 1.02 * 1.02; 
        const delta = totalScore - baseScore;

        let grade = 5; 
        if (delta > 7.0) grade = 10;
        else if (delta > 5.0) grade = 9;
        else if (delta > 3.0) grade = 8;
        else if (delta > 1.0) grade = 7;
        else if (delta > -1.0) grade = 6;
        else if (delta > -3.0) grade = 5;
        else if (delta > -5.0) grade = 4;
        else if (delta > -7.0) grade = 3;
        else if (delta > -9.0) grade = 2;
        else grade = 1;

        if (grade >= 9) return { className: 'line-strongest', label: '超特級' };
        if (grade === 8) return { className: 'line-strong', label: '特級' };
        if (grade === 7) return { className: 'line-high', label: '上級' };
        if (grade === 6) return { className: 'line-medium-high', label: '中上級' };
        if (grade === 5) return { className: 'line-medium', label: '標準' };
        if (grade === 4) return { className: 'line-medium-low', label: '中下級' };
        if (grade === 3) return { className: 'line-low', label: '下級' };
        if (grade === 2) return { className: 'line-weak', label: '劣級' };
        return { className: 'line-weakest', label: '最劣級' };
    }


    // ====================================================================
    // 3. メイン計算関数
    // ====================================================================

    function calculateScore(mode) {
        const riders = [];
        const debug = [];
        const isGirls = document.getElementById('raceType').value === 'girl';

        // 1. データ取得
        for (let i = 1; i <= RIDER_COUNT; i++) {
            const score = parseFloat(document.querySelector(`.score[data-id="${i}"]`).value) || 0;
            const recent = parseFloat(document.querySelector(`.recent-rank[data-id="${i}"]`).value) || 0;
            const legType = document.querySelector(`.leg-type[data-id="${i}"]`).value.toUpperCase();
            const wMark = document.querySelector(`.w-mark[data-id="${i}"]`).value.toUpperCase();
            const isSRank1 = document.querySelector(`.s-rank-1[data-id="${i}"]`).checked;
            const isBRank1 = document.querySelector(`.b-rank-1[data-id="${i}"]`).checked;

            riders.push({
                id: i, score, recent, leg: legType, wMark, isSRank1, isBRank1,
                finalScore: 0, baseCoef: 1.00
            });
        }
        
        // 動的k係数を決定
        const allScores = riders.map(r => r.score).filter(s => s > 0); 
        const kInfo = getDynamicEnduranceK(allScores);
        const dynamicK = kInfo.k;

        document.getElementById('raceLevelInfo').innerHTML = `
            <strong>レースレベル推定:</strong> ${kInfo.level} (平均得点: ${kInfo.mean})<br>
            <strong>適用される結束力係数 (k):</strong> <code>${dynamicK}</code>
        `;

        const lineupText = document.getElementById('lineup').value.replace(/\s/g, '');
        const lines = lineupText.split(',').map(l => l.split('-').map(id => parseInt(id)));
        const scenario = document.getElementById('scenario').value;
        const bankBias = parseFloat(document.getElementById('bankBias').value) || 1.00;

        // 2. ライン情報の整理とライン評価の準備
        const lineData = [];
        lines.forEach((line, lineIndex) => {
            const lineScores = line.map(id => riders[id - 1].score);
            const lineLegs = line.map(id => riders[id - 1].leg);

            if (line.length > 1) { 
                const C_End = calculateEnduranceCoef(lineScores, dynamicK); 
                const C_Leg = calculateLegIntegrity(lineLegs);
                const avgScore = lineScores.reduce((a, b) => a + b, 0) / lineScores.length;
                
                const lineGrade = getLineGrade(avgScore, C_End, C_Leg);
                
                lineData.push({
                    riders: line, C_End, C_Leg, avgScore, grade: lineGrade
                });
                debug.push(`Line L${lineIndex + 1} (${line.join('-')}) Debug: K=${dynamicK}, C_End=${C_End.toFixed(3)}, C_Leg=${C_Leg.toFixed(3)}`);
            }
        });


        // 3. スコア計算と補正適用
        riders.forEach(rider => {
            let baseCoef = 1.00;
            let currentLine = lineData.find(l => l.riders.includes(rider.id));
            let riderPosition = currentLine ? currentLine.riders.indexOf(rider.id) + 1 : 0;
            
            // A. 基本補正 (直近着順、バンク脚質、展開シナリオ)
            baseCoef *= (1 + (4.0 - rider.recent) * 0.05); 
            if (JIRIKI_LEGS.includes(rider.leg)) baseCoef *= bankBias;
            if (scenario === 'senko' && rider.leg === 'S') baseCoef *= 1.05;
            if (scenario === 'makuri' && rider.leg === 'M') baseCoef *= 1.05;
            if (scenario === 'sashi' && (rider.leg === 'K' || rider.leg === 'O')) baseCoef *= 1.03;


            // B. 連係・単騎ロジック (ポジション、結束力、整合性、単騎ボーナス)
            if (currentLine) {
                let C_Pos = POSITION_BONUS[riderPosition] || 1.00;
                C_Pos *= currentLine.C_End;
                C_Pos *= currentLine.C_Leg;
                baseCoef *= C_Pos;
            } else {
                if (!isGirls) {
                    baseCoef *= SOLO_BONUS;
                }
            }


            // C. W印補正 (モード分岐)
            let wMarkCoef = W_MARK_COEFS[rider.wMark] || 1.00;

            if (mode === 'normal') {
                baseCoef *= wMarkCoef;
            } else if (mode === 'filter') {
                if (rider.wMark === '◎' || rider.wMark === '〇') {
                    baseCoef *= 1.05;
                } else {
                    baseCoef *= 1.00; 
                }
            }
            
            // D. S/B トップ選手ボーナス
            if (rider.isSRank1) {
                baseCoef *= S_BONUS;
            }
            if (rider.isBRank1) {
                baseCoef *= B_BONUS;
            }

            rider.baseCoef = baseCoef;
            rider.finalScore = rider.score * baseCoef;
        });


        // 4. 結果出力
        displayResults(riders, lineData, mode);
        document.getElementById('debugOutput').textContent = debug.join('\n');
    }

    // ====================================================================
    // 4. 結果表示関数
    // ====================================================================

    function displayResults(riders, lineData, mode) {
        const sortedRiders = [...riders].sort((a, b) => b.finalScore - a.finalScore);
        
        const modeText = mode === 'normal' ? '【晴天令 (W印重視) モード】' : '【荒天令W印フィルタ (穴目重視) モード】';
        document.getElementById('currentMode').textContent = modeText;

        // スコアテーブル
        let tableHTML = '<thead><tr><th>順位</th><th>ID</th><th>脚質</th><th>素点</th><th>補正係数</th><th>最終スコア</th></tr></thead><tbody>';
        sortedRiders.forEach((r, index) => {
            const positionClass = index < 3 ? 'result-best' : '';
            tableHTML += `<tr class="${positionClass}">
                <td>${index + 1}</td>
                <td>${r.id}</td>
                <td>${r.leg}</td>
                <td>${r.score.toFixed(2)}</td>
                <td>${r.baseCoef.toFixed(3)}</td>
                <td>${r.finalScore.toFixed(2)}</td>
            </tr>`;
        });
        document.getElementById('scoreTable').innerHTML = tableHTML;

        // ライン総合評価テーブル
        let lineHTML = '<table><thead><tr><th>ライン</th><th>構成選手</th><th>平均素点</th><th>評価</th></tr></thead><tbody>';
        const singleRiders = riders.filter(r => !lineData.some(l => l.riders.includes(r.id))).map(r => r.id);
        
        lineData.forEach((line, index) => {
            const grade = line.grade;
            lineHTML += `<tr>
                <td>L${index + 1}</td>
                <td>${line.riders.join('-')}</td>
                <td>${line.avgScore.toFixed(2)}</td>
                <td class="${grade.className}">${grade.label}</td>
            </tr>`;
        });
        
        if (singleRiders.length > 0) {
             lineHTML += `<tr>
                <td colspan="4" class="single-rider">単騎選手 (自由度ボーナス適用*): ${singleRiders.join(', ')}</td>
            </tr>`;
        }
        document.getElementById('lineRankingArea').innerHTML = lineHTML;


        // 買い目シミュレーション (上位3名からフォーメーション)
        const top3 = sortedRiders.slice(0, 3).map(r => r.id);
        const top4 = sortedRiders.slice(0, 4).map(r => r.id);

        let predHTML = '<thead><tr><th>着順</th><th>1着候補</th><th>2着候補</th><th>3着候補</th></tr></thead><tbody>';
        
        const set1 = new Set();
        for (const p1 of top3) {
            for (const p2 of top3) {
                if (p1 === p2) continue;
                for (const p3 of top4) {
                    if (p3 === p1 || p3 === p2) continue;
                    set1.add(`${p1}-${p2}-${p3}`);
                }
            }
        }
        
        predHTML += `<tr class="result-best">
            <td>推奨</td>
            <td>${top3.join(', ')}</td>
            <td>${top3.join(', ')}</td>
            <td>${top4.join(', ')}</td>
        </tr>`;
        predHTML += `<tr><td colspan="4" style="text-align: left; font-size: 0.9em;">合計 ${set1.size}点: ${Array.from(set1).join(', ')}</td></tr>`;
        document.getElementById('predictionTable').innerHTML = predHTML;
    }
</script>

</body>
</html>
