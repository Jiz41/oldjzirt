<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華耀天輪 真・自在律 V6.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 1200px; margin: auto; background-color: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15); }
        h1, h2 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 5px; margin-top: 30px; }
        .input-group, .result-section { margin-bottom: 25px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #fafafa; }
        .flex-row { display: flex; gap: 25px; margin-bottom: 15px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #3498db; color: white; }
        .debug-log { background-color: #2c3e50; color: #ecf0f1; padding: 15px; height: 180px; overflow-y: scroll; font-family: 'Courier New', Courier, monospace; border-radius: 5px; margin-top: 10px; font-size: 0.9em; }
        .recommendation { padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        #seitenrei-output { background-color: #e8f8f5; border-left: 5px solid #1abc9c; }
        #koutenrei-output { background-color: #fbecec; border-left: 5px solid #e74c3c; }
        .scenario-detail { border: 1px dashed #95a5a6; padding: 15px; margin-top: 20px; border-radius: 5px; }
        button { padding: 12px 25px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 1.1em; transition: background-color 0.3s; }
        button:hover { background-color: #27ae60; }
        input[type="number"], input[type="text"], select { padding: 8px; border: 1px solid #bdc3c7; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>華耀天輪 真・自在律 V6.0</h1>

    <h2>🛠️ デバッグ・処理ログ</h2>
    <div class="debug-log" id="debug-log">
        [TOOL START] ツール起動。すべての係数とロジックを読み込みました。<br>
        [INFO] 予想計算を実行してください...
    </div>

    <h2>🎛️ レース/選手情報入力</h2>
    <div class="input-group">
        
        <div class="flex-row">
            <div>
                <label for="race-type"><strong>レースタイプ/級班:</strong></label>
                <select id="race-type">
                    <option value="girls">🚴‍♀️ ガールズ競輪</option>
                    <option value="s-kyu">🏆 S級</option>
                    <option value="a-kyu">A級</option>
                    <option value="a-chal">A級チャレンジ</option>
                </select>
            </div>
            <div>
                <label for="bank-name">バンク名:</label>
                <select id="bank-name">
                    <option value="standard">標準バンク（無補正）</option>
                    <option value="senko_dis">先行不利（例: 東京）</option>
                    <option value="makuri_adv">捲り有利（例: 静岡）</select>
            </div>
            <div>
                <label for="wind-direction">風向き:</label>
                <select id="wind-direction">
                    <option value="none">なし (無補正)</option>
                    <option value="mukae">向かい風</option>
                    <option value="oi">追い風</option>
                </select>
            </div>
        </div>

        <p><strong>選手データ入力 (7名)</strong></p>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>脚質</th>
                    <th>得点 (R)</th>
                    <th>W印</th>
                    <th>直近3走 (例: 111)</th>
                    <th>S/B 1位</th>
                </tr>
            </thead>
            <tbody id="player-data">
                <tr><td>1</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="1" class="score" value="105.50"></td><td><input type="text" data-id="1" class="wmark" value="◎"></td><td><input type="text" data-id="1" class="recent" value="111"></td><td><input type="checkbox" data-id="1" class="sb1"></td></tr>
                <tr><td>2</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="2" class="score" value="103.20"></td><td><input type="text" data-id="2" class="wmark" value="〇"></td><td><input type="text" data-id="2" class="recent" value="211"></td><td><input type="checkbox" data-id="2" class="sb1"></td></tr>
                <tr><td>3</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="3" class="score" value="101.80"></td><td><input type="text" data-id="3" class="wmark" value="△"></td><td><input type="text" data-id="3" class="recent" value="444"></td><td><input type="checkbox" data-id="3" class="sb1" checked></td></tr>
                <tr><td>4</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="4" class="score" value="99.50"></td><td><input type="text" data-id="4" class="wmark" value="無"></td><td><input type="text" data-id="4" class="recent" value="333"></td><td><input type="checkbox" data-id="4" class="sb1"></td></tr>
                <tr><td>5</td><td><select><option value="両">両</option><option value="自">自</option><option value="追">追</option></select></td><td><input type="number" data-id="5" class="score" value="98.00"></td><td><input type="text" data-id="5" class="wmark" value="無"></td><td><input type="text" data-id="5" class="recent" value="555"></td><td><input type="checkbox" data-id="5" class="sb1"></td></tr>
                <tr><td>6</td><td><select><option value="自">自</option><option value="追">追</option><option value="両">両</option></select></td><td><input type="number" data-id="6" class="score" value="97.20"></td><td><input type="text" data-id="6" class="wmark" value="無"></td><td><input type="text" data-id="6" class="recent" value="666"></td><td><input type="checkbox" data-id="6" class="sb1"></td></tr>
                <tr><td>7</td><td><select><option value="追">追</option><option value="自">自</option><option value="両">両</option></select></td><td><input type="number" data-id="7" class="score" value="95.10"></td><td><input type="text" data-id="7" class="wmark" value="無"></td><td><input type="text" data-id="7" class="recent" value="777"></td><td><input type="checkbox" data-id="7" class="sb1"></td></tr>
            </tbody>
        </table>

        <div style="margin-top: 20px;">
            <label for="line-input"><strong>全体並び:</strong> (例: 123,45,67 または 1,2,3,4,5,6,7)</label>
            <input type="text" id="line-input" value="1,2,3,4,5,6,7" style="width: 300px;">
        </div>
        
        <button onclick="calculatePrediction()">🚀 予想を計算 (実行)</button>
    </div>

    <h2>📊 予想結果・推奨買い目</h2>
    <div class="result-section">
        
        <p><strong>連係評価:</strong> <span id="line-strength">計算結果待ち...</span></p>

        <h3>☀️ 晴天令 (安定推奨)</h3>
        <div class="recommendation" id="seitenrei-output">
            計算結果待ち...
        </div>

        <h3>⛈️ 荒天令 (高配当狙い)</h3>
        <div class="recommendation" id="koutenrei-output">
            計算結果待ち...
        </div>

        <h3>展開別シミュレーション詳細</h3>
        
        <div id="scenario-output">
            </div>

    </div>
</div>

<script src="keirin_logic_v6.0.js"></script>
</body>
</html>
