<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競輪スコア計算機</title>
<style>
body { font-family: sans-serif; margin: 20px; font-size: 16px; }
input, select { margin-bottom: 10px; width: 100%; padding: 5px; }
button { padding: 10px; margin-top: 10px; width: 100%; }
.result { margin-top: 20px; }
</style>
</head>
<body>
<h2>競輪スコア計算機</h2>

<label>場名</label>
<select id="trackSelect"></select>

<label>時間帯</label>
<select id="timeSelect">
  <option value="モーニング">モーニング</option>
  <option value="デイ">デイ</option>
  <option value="ナイター">ナイター</option>
  <option value="ミッドナイト">ミッドナイト</option>
</select>

<label>風向き</label>
<select id="windSelect">
  <option value="東">東</option>
  <option value="西">西</option>
  <option value="南">南</option>
  <option value="北">北</option>
</select>

<h3>選手情報 (スコア、脚質)</h3>
<div id="riders">
  <div>
    <input type="text" placeholder="選手名" class="riderName">
    <select class="riderStyle">
      <option value="逃げ">逃げ</option>
      <option value="差し">差し</option>
      <option value="捲り">捲り</option>
      <option value="マーク">マーク</option>
    </select>
    <input type="number" placeholder="スコア" class="riderScore">
  </div>
</div>
<button onclick="addRider()">選手追加</button>
<button onclick="calculate()">計算</button>

<div class="result" id="result"></div>

<script>
let bankData;

fetch('bankdata.json')
  .then(res => res.json())
  .then(data => {
    bankData = data;
    const trackSelect = document.getElementById('trackSelect');
    for(const track in bankData){
      const option = document.createElement('option');
      option.value = track;
      option.textContent = track;
      trackSelect.appendChild(option);
    }
    updateWindOptions();
  });

document.getElementById('trackSelect').addEventListener('change', updateWindOptions);

function updateWindOptions(){
  const track = document.getElementById('trackSelect').value;
  const windSelect = document.getElementById('windSelect');
  windSelect.innerHTML = '';
  if(bankData[track].wind_or_position){
    for(const wind in bankData[track].wind_or_position){
      const option = document.createElement('option');
      option.value = wind;
      option.textContent = wind;
      windSelect.appendChild(option);
    }
  }
}

function addRider(){
  const ridersDiv = document.getElementById('riders');
  const div = document.createElement('div');
  div.innerHTML = `<input type="text" placeholder="選手名" class="riderName">
  <select class="riderStyle">
    <option value="逃げ">逃げ</option>
    <option value="差し">差し</option>
    <option value="捲り">捲り</option>
    <option value="マーク">マーク</option>
  </select>
  <input type="number" placeholder="スコア" class="riderScore">`;
  ridersDiv.appendChild(div);
}

function calculate(){
  const track = document.getElementById('trackSelect').value;
  const time = document.getElementById('timeSelect').value;
  const wind = document.getElementById('windSelect').value;

  const riders = [];
  document.querySelectorAll('#riders > div').forEach(div => {
    const name = div.querySelector('.riderName').value || '無名';
    const style = div.querySelector('.riderStyle').value;
    const score = parseFloat(div.querySelector('.riderScore').value) || 0;
    riders.push({name, style, score});
  });

  // スコア補正
  riders.forEach(r => {
    const bias = bankData[track].keirin_bias;
    if(r.style === '逃げ') r.score *= bias['先行'] || 1;
    if(r.style === '捲り') r.score *= bias['捲り'] || 1;
    if(r.style === '差し') r.score *= bias['差し'] || 1;

    const windEffect = bankData[track].wind_or_position[wind] || 1;
    r.score *= windEffect;
  });

  // スコア順ソート
  riders.sort((a,b)=>b.score - a.score);

  // 三連単 12点
  const top3 = riders.slice(0,3).map(r=>r.name);
  const top4 = riders.slice(0,4).map(r=>r.name);
  let trisan = `${top3[0]}-${top3[1]}-${top3[2]}`;
  let sanrenfuku = top4.join(',');

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = `<h3>補正後スコアランキング</h3>`;
  riders.forEach(r=>{
    resultDiv.innerHTML += `${r.name}: ${r.score.toFixed(2)}<br>`;
  });
  resultDiv.innerHTML += `<h3>買い目</h3>`;
  resultDiv.innerHTML += `三連単12点: ${trisan}<br>`;
  resultDiv.innerHTML += `三連複4点: ${sanrenfuku}<br>`;
}
</script>
</body>
</html>
