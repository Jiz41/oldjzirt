<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競輪スコア計算</title>
<style>
  body { font-family: sans-serif; padding: 10px; }
  input, select { font-size: 16px; margin: 5px 0; width: 100%; }
  button { font-size: 16px; margin: 10px 0; width: 100%; }
  .player { margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
  .results { margin-top: 20px; }
</style>
</head>
<body>

<h2>競輪スコア計算</h2>

<label>場名:</label>
<select id="placeSelect"></select>

<label>時間帯:</label>
<select id="timeSelect">
  <option value="day">デイ</option>
  <option value="night">ナイター</option>
  <option value="midnight">ミッドナイト</option>
</select>

<label>風・隊列補正:</label>
<select id="windSelect">
  <option value="">なし</option>
  <option value="追い風">追い風</option>
  <option value="向かい風">向かい風</option>
  <option value="横風">横風</option>
  <option value="外伸び">外伸び</option>
</select>

<h3>選手情報 (7人)</h3>
<div id="players">
</div>

<label>並び (例: 123,45,6,7):</label>
<input type="text" id="lineup" placeholder="並びをカンマ区切りで入力">

<button onclick="calculate()">計算</button>

<div class="results" id="results"></div>

<script>
// JSONデータを読み込む
let bankData;
fetch('bankdata.json')
  .then(res => res.json())
  .then(data => {
    bankData = data;
    populatePlaces();
    populatePlayers();
  });

// 場名選択肢生成
function populatePlaces() {
  const select = document.getElementById('placeSelect');
  for (let place in bankData) {
    const opt = document.createElement('option');
    opt.value = place;
    opt.textContent = place;
    select.appendChild(opt);
  }
}

// 選手入力欄生成
function populatePlayers() {
  const container = document.getElementById('players');
  container.innerHTML = '';
  for (let i=1; i<=7; i++) {
    const div = document.createElement('div');
    div.className = 'player';
    div.innerHTML = `
      <label>選手${i} 得点:</label>
      <input type="number" id="score${i}" value="80">
      <label>脚質:</label>
      <select id="style${i}">
        <option value="逃げ">逃げ</option>
        <option value="差し">差し</option>
        <option value="捲り">捲り</option>
        <option value="マーク">マーク</option>
      </select>
    `;
    container.appendChild(div);
  }
}

// 計算処理
function calculate() {
  const place = document.getElementById('placeSelect').value;
  const time = document.getElementById('timeSelect').value;
  const wind = document.getElementById('windSelect').value;
  const lineupStr = document.getElementById('lineup').value;
  const lineupGroups = lineupStr.split(',').map(g => g.split('').map(n => parseInt(n)));

  const scores = [];
  for (let i=1; i<=7; i++) {
    let base = parseFloat(document.getElementById(`score${i}`).value);
    let style = document.getElementById(`style${i}`).value;
    let bias = bankData[place]?.keirin_bias?.[style] || 1.0;
    let windBonus = bankData[place]?.wind_or_position?.[wind] || 1.0;
    let finalScore = base * bias * windBonus;
    scores.push({player:i, score:finalScore});
  }

  // スコア降順
  scores.sort((a,b)=>b.score-a.score);

  // 三連単12点・三連複4点を適当生成（並びに基づく）
  let flatLineup = lineupGroups.flat().filter(n=>n>=1 && n<=7);
  let trysan = flatLineup.slice(0,3);
  let trin = flatLineup.slice(0,4);

  // 結果表示
  let resultDiv = document.getElementById('results');
  let html = '<h3>補正後スコアランキング</h3><ol>';
  scores.forEach(s=>{html+=`<li>選手${s.player}: ${s.score.toFixed(2)}</li>`});
  html += '</ol>';
  html += '<h3>買い目</h3>';
  html += `<p>三連単12点: ${trysan.join('-')}</p>`;
  html += `<p>三連複4点: ${trin.join(',')}</p>`;
  resultDiv.innerHTML = html;
}
</script>

</body>
</html>
