<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Calculator - Mobile</title>
<style>
  body { font-family: sans-serif; margin: 10px; font-size: 18px; }
  label, input, select, button { display: block; width: 100%; margin: 8px 0; font-size: 18px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 18px; }
  button { padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; }
  button:active { background-color: #45a049; }
  pre { background-color: #f2f2f2; padding: 10px; white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<h2>競走スコア計算（スマホ用）</h2>

<label>場名:
  <select id="racetrack"></select>
</label>
<label>風:
  <select id="wind"></select>
</label>
<label>時間帯:
  <select id="time"></select>
</label>

<h3>選手データ入力（7人）</h3>
<table>
<tr><th>選手</th><th>脚質</th><th>競走得点</th></tr>
<tr><td>1</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>2</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>3</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>4</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>5</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>6</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
<tr><td>7</td><td><input type="text" class="style" placeholder="先行/差し/追込"></td><td><input type="number" class="score" value="0"></td></tr>
</table>

<label>並び（例:123,45,6,7）:
  <input type="text" id="lineup" size="20">
</label>

<button id="calcBtn">計算</button>

<h3>補正後スコアランキング</h3>
<pre id="result"></pre>

<h3>買い目</h3>
<pre id="bets"></pre>

<script>
let bankData = {};

fetch('bankdata.json')
  .then(res => res.json())
  .then(data => {
    bankData = data;
    const racetrackSelect = document.getElementById('racetrack');
    Object.keys(bankData).forEach(track => {
      const opt = document.createElement('option');
      opt.value = track;
      opt.textContent = track;
      racetrackSelect.appendChild(opt);
    });

    ['東','西','南','北','無風'].forEach(w => {
      const opt = document.createElement('option');
      opt.value = w; opt.textContent = w;
      document.getElementById('wind').appendChild(opt);
    });
    ['デイ','ナイター','ミッドナイト'].forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      document.getElementById('time').appendChild(opt);
    });
  })
  .catch(err => console.error('JSON読み込み失敗:', err));

function calcScore() {
  const styles = [...document.getElementsByClassName('style')].map(e => e.value.trim());
  const scores = [...document.getElementsByClassName('score')].map(e => Number(e.value));
  const track = document.getElementById('racetrack').value;
  const wind = document.getElementById('wind').value;
  const time = document.getElementById('time').value;

  const adjScores = scores.map((s, i) => {
    const style = styles[i];
    let coef = 1;
    if(bankData[track] && bankData[track][style]) coef = bankData[track][style];
    if(wind === '東') coef *= 1.05;
    if(time === 'ナイター') coef *= 1.02;
    if(time === 'ミッドナイト') coef *= 0.98;
    return s * coef;
  });

  const ranked = adjScores.map((s,i)=>({i:i+1,s:s})).sort((a,b)=>b.s-a.s);
  document.getElementById('result').textContent = ranked.map(r=>`選手${r.i}: ${r.s.toFixed(2)}`).join('\n');

  const lineup = document.getElementById('lineup').value.split(',');
  const allNumbers = lineup.flatMap(g=>g.split('').map(n=>Number(n)));
  const triSingle = [];
  for(let i=0;i<3;i++)
    for(let j=i+1;j<3;j++)
      for(let k=j+1;k<3;k++)
        triSingle.push([allNumbers[i],allNumbers[j],allNumbers[k]]);
  const triSingle12 = triSingle.slice(0,12);
  document.getElementById('bets').textContent = `三連単12点:\n${triSingle12.map(a=>a.join('-')).join('\n')}\n\n三連複4点:\n${allNumbers.slice(0,4).join(',')}`;
}

document.getElementById('calcBtn').addEventListener('click', calcScore);
</script>
</body>
</html>
