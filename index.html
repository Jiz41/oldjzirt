<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYOU SHAKKOU 自在律：RONDE</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <header>
        <div class="subtitle">異聞演算制御多重交響体</div>
        <div class="title-image-container">
            <img src="./title.png" alt="華耀灼 自在律：RONDE" class="title-image">
        </div>
    </header>

    <!-- 入力フォーム -->
    <h2>📡 レース情報取得</h2>
    <div class="input-group">
        <div class="input-item">
            <label for="venue-select">会場</label>
            <select id="venue-select">
                <option value="kawaguchi">川口</option>
                <option value="isesaki">伊勢崎</option>
                <option value="hamamatsu">浜松</option>
                <option value="iizuka">飯塚</option>
                <option value="sanyo">山陽</option>
            </select>
        </div>
        <div class="input-item">
            <label for="kaisai-id">開催ID（例：2026031503）</label>
            <input type="text" id="kaisai-id" placeholder="2026031503" maxlength="12">
        </div>
        <div class="input-item">
            <label for="day-input">日目</label>
            <input type="number" id="day-input" value="1" min="1" max="5">
        </div>
        <div class="input-item">
            <label for="race-no">レース番号</label>
            <input type="number" id="race-no" value="1" min="1" max="12">
        </div>
        <button id="fetch-btn" onclick="fetchRace()">🚀 データ取得・予想</button>
    </div>

    <!-- 結果エリア -->
    <div id="results-area" style="display:none;">

        <!-- 走路状態 -->
        <div style="padding: 0 15px;">
            <span id="road-badge" class="road-badge">−</span>
        </div>

        <!-- 選手カード -->
        <h2>🏍️ 出走選手</h2>
        <div class="riders-section" id="riders-container"></div>

        <!-- 荒れ度・買い目 -->
        <h2>🎯 予想結果</h2>
        <div class="result-section">
            <div id="volatility-display"></div>
            <h3>3連単</h3>
            <ul class="bet-list" id="sanrentan-list"></ul>
            <h3>2連単</h3>
            <ul class="bet-list" id="nirentan-list"></ul>
        </div>

    </div>

    <!-- デバッグログ -->
    <div class="debug-log-header" onclick="toggleDebugLog()">
        <span id="log-toggle-icon">▶</span> 🛠️ デバッグログ
    </div>
    <div class="debug-log" id="debug-log">
        [RONDE] 起動待機中...
    </div>

    <footer class="copyright-footer">
        <div class="footer-bottom-row">
            <span>(C)2025-2026 Mushyn Reagan</span>
        </div>
    </footer>

</div>

<script src="./ar_ronde.js" defer></script>
<script src="./ar_adapter.js" defer></script>
<script src="./ar_main.js" defer></script>

<script>
function toggleDebugLog() {
    const el = document.getElementById('debug-log');
    const ic = document.getElementById('log-toggle-icon');
    if (el.style.display === 'block') { el.style.display = 'none'; ic.textContent = '▶'; }
    else { el.style.display = 'block'; ic.textContent = '▼'; }
}
</script>

</body>
</html>
