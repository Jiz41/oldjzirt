<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華耀天輪 真・自在律 V7.4 - Mobile (Optimized)</title>
    <style>
        html {
            overflow-y: scroll;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 30px;
            background-color: #fbf8f5;
            color: #333;
            -webkit-overflow-scrolling: touch;
            overflow-x: clip;
            overscroll-behavior-y: contain;
        }
        .container {
            width: calc(100% - 20px);
            max-width: 600px;
            margin: 10px auto;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }
        h2 {
            font-size: 1.2em;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #eee;
            padding: 6px 4px;
            text-align: center;
            font-size: 0.85em;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .player-row:nth-child(even) {
            background-color: #fafafa;
        }
        #debug-log {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.75em;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            line-height: 1.4;
        }
        #results-container {
            display: none;
        }
        #results-container.visible {
            display: block;
        }
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        @media (max-width: 480px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>選手情報入力</h2>
        <table>
            <thead>
                <tr>
                    <th>車</th>
                    <th>得点</th>
                    <th>脚</th>
                    <th>W</th>
                    <th>3走</th>
                    <th>S</th>
                    <th>B</th>
                    <th>欠</th>
                </tr>
            </thead>
            <tbody id="player-table-body">
                <!-- 1番車から9番車までループ生成 -->
                <script>
                    for (let i = 1; i <= 9; i++) {
                        document.write(`
                            <tr class="player-row" data-id="${i}">
                                <td>${i}</td>
                                <td><input type="number" class="score" step="0.1" oninput="debouncedCalculate()"></td>
                                <td>
                                    <select class="style" onchange="debouncedCalculate()">
                                        <option value="自">自</option>
                                        <option value="両">両</option>
                                        <option value="追" selected>追</option>
                                    </select>
                                </td>
                                <td><input type="text" class="wmark" oninput="debouncedCalculate()"></td>
                                <td><input type="text" class="recent" oninput="debouncedCalculate()"></td>
                                <td><input type="radio" name="s-leader" data-id="${i}" onchange="debouncedCalculate()"></td>
                                <td><input type="radio" name="b-leader" data-id="${i}" onchange="debouncedCalculate()"></td>
                                <td><input type="checkbox" class="is-scratch" onchange="debouncedCalculate()"></td>
                            </tr>
                        `);
                    }
                </script>
            </tbody>
        </table>
    </div>

    <div class="container">
        <h2>レース設定</h2>
        <div style="margin-bottom: 10px;">
            <label>ライン構成:</label>
            <input type="text" id="line-input" placeholder="例: 123,45,67" oninput="debouncedCalculate()">
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>級班:</label>
                <select id="race-type" onchange="debouncedCalculate()">
                    <option value="s-kyu">S級</option>
                    <option value="a-kyu" selected>A級</option>
                    <option value="a-chal">A級チャレンジ</option>
                    <option value="girls">ガールズ</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>バンク:</label>
                <select id="bank-name" onchange="debouncedCalculate()"></select>
            </div>
        </div>
        <div id="bank-tendency-display" style="margin-top: 10px; font-size: 0.9em; color: #666;"></div>
    </div>

    <div class="container">
        <div id="line-display"></div>
    </div>

    <div class="container" id="results-container">
        <div id="tenun-index-output"></div>
        <div class="results-grid">
            <div id="seitenrei-output"></div>
            <div id="koutenrei-output"></div>
        </div>
        <div id="scenario-output"></div>
    </div>

    <div class="container">
        <h2>デバッグログ</h2>
        <div id="debug-log"></div>
    </div>

    <script src="tamaki_speech.js"></script>
    <script src="keirin_logic_v6.0.js"></script>
</body>
</html>
