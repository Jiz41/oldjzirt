<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競輪スコア計算機 完全版</title>
<style>
  body { font-family: sans-serif; margin: 10px; font-size: 16px; }
  select, input { font-size: 16px; margin: 5px 0; }
  table { border-collapse: collapse; width: 100%; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
  th { background: #eee; }
  .result { margin-top: 10px; }
</style>
</head>
<body>

<h2>競輪スコア計算機</h2>

<label>場を選択：
  <select id="bankSelect"></select>
</label>
<br>
<label>時間帯：
  <select id="timeSelect">
    <option value="モーニング">モーニング</option>
    <option value="デイ">デイ</option>
    <option value="ナイター">ナイター</option>
    <option value="ミッドナイト">ミッドナイト</option>
  </select>
</label>
<br>
<label>風向き：
  <select id="windSelect">
    <option value="なし">なし</option>
    <option value="東">東</option>
    <option value="西">西</option>
    <option value="南">南</option>
    <option value="北">北</option>
  </select>
</label>
<br>
<button id="calcBtn">スコア計算</button>

<div class="result" id="result"></div>

<script>
let bankData = {};
let players = [
  // 手入力例：名前、脚質、競走得点
  {name:"選手1", style:"逃げ", score:87.12},
  {name:"選手2", style:"差し", score:83.28},
  {name:"選手3", style:"捲り", score:91.96},
  {name:"選手4", style:"マーク", score:81.86},
  {name:"選手5", style:"差し", score:80.95},
  {name:"選手6", style:"捲り", score:84.78},
  {name:"選手7", style:"逃げ", score:81.42},
];

// 選手全体並び順（手入力）
let playerOrder = ["選手3","選手1","選手6","選手2","選手4","選手7","選手5"];

fetch('bankdata.json')
  .then(res => res.json())
  .then(data => {
    bankData = data;
    const select = document.getElementById('bankSelect');
    Object.keys(bankData).forEach(bank => {
      const option = document.createElement('option');
      option.value = bank;
      option.textContent = bank;
      select.appendChild(option);
    });
  });

function calculateScore() {
  const bank = document.getElementById('bankSelect').value;
  const time = document.getElementById('timeSelect').value;
  const wind = document.getElementById('windSelect').value;
  const bankInfo = bankData[bank];

  let result = players.map(p => {
    let score = p.score;

    // 脚質補正
    if(bankInfo.keirin_bias[p.style]) {
      score *= bankInfo.keirin_bias[p.style];
    }

    // 風向き補正
    if(wind !== "なし" && bankInfo.wind_or_position[wind]) {
      score *= bankInfo.wind_or_position[wind];
    }

    return {...p, adjusted: parseFloat(score.toFixed(2))};
  });

  // 全体並び順で並び替え
  result.sort((a,b) => {
    return playerOrder.indexOf(a.name) - playerOrder.indexOf(b.name);
  });

  // スコア順に表示用に再ソート
  const scoreRank = [...result].sort((a,b) => b.adjusted - a.adjusted);

  // 三連単12点、三連複4点（単純例）
  const trianSingle = scoreRank.slice(0,3).map(p => p.name).join('-');
  const trianMulti = scoreRank.slice(0,4).map(p => p.name).join(',');

  const resDiv = document.getElementById('result');
  resDiv.innerHTML = `
    <h3>補正後スコアランキング</h3>
    <table>
      <tr><th>選手</th><th>スコア</th></tr>
      ${scoreRank.map(p => `<tr><td>${p.name}</td><td>${p.adjusted}</td></tr>`).join('')}
    </table>
    <h3>買い目</h3>
    <p>三連単12点: ${trianSingle}</p>
    <p>三連複4点: ${trianMulti}</p>
  `;
}

document.getElementById('calcBtn').addEventListener('click', calculateScore);
</script>

</body>
</html>
