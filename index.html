<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RaceCalc 完全版</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    font-family: sans-serif;
    margin: 10px;
}
input, select, button, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    font-size: 18px;
}
.result {
    margin-top: 20px;
    padding: 10px;
    background: #f7f7f7;
    border: 1px solid #ccc;
}
.line-title {
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>RaceCalc（完全版）</h2>

<!-- 場名 -->
<label>場名（bankdata.json から自動読込）</label>
<select id="bankSelect"></select>

<!-- 時間帯 -->
<label>時間帯</label>
<select id="timeSelect">
  <option value="morning">朝</option>
  <option value="day">昼</option>
  <option value="evening">夕方</option>
  <option value="night">ナイター</option>
</select>

<!-- 風 -->
<label>風向き（0〜360°）</label>
<input id="windDir" type="number" value="0">

<label>風速（m/s）</label>
<input id="windSpeed" type="number" value="0">

<!-- 並び -->
<label>並び（例：123,45,6,7）</label>
<input id="lineInput" type="text" placeholder="例：123,45,6,7">

<!-- 選手データ -->
<div id="riderInputs"></div>

<button onclick="calc()">計算する</button>

<div id="result" class="result"></div>

<script>
// ===============================
// JSON 読み込み（場名ロード）
// ===============================
let bankData = null;

fetch("bankdata.json")
  .then(r => r.json())
  .then(j => {
    bankData = j;
    const select = document.getElementById("bankSelect");
    j.banks.forEach(b => {
      const op = document.createElement("option");
      op.value = b.name;
      op.textContent = b.name;
      select.appendChild(op);
    });
  });

// ===============================
// 選手入力欄（7人固定）
// ===============================
const riderDiv = document.getElementById("riderInputs");
for (let i = 1; i <= 7; i++) {
  riderDiv.insertAdjacentHTML("beforeend", `
    <div class="line-title">選手${i}</div>
    <label>得点</label>
    <input id="score${i}" type="number" step="0.1">
    <label>脚質</label>
    <select id="style${i}">
      <option value="逃げ">逃げ</option>
      <option value="差し">差し</option>
      <option value="捲り">捲り</option>
      <option value="マーク">マーク</option>
    </select>
  `);
}

// ===============================
// 並び解析
// ===============================
function parseLines(str) {
  return str.split(",").map(g => g.split("").map(n => Number(n)));
}

// ===============================
// スコア補正ロジック（本格版）
// ===============================
function scoreAdjust(r, lineInfo, bank, windDir, windSpeed, timeZone) {
  let s = r.score;

  // --- 脚質補正 ---
  if (r.style === "逃げ") s += 2.0;
  if (r.style === "差し") s += 1.0;
  if (r.style === "捲り") s += 1.5;
  if (r.style === "マーク") s += 0.5;

  // --- ライン位置 ---
  if (lineInfo.pos === 1) s += 2.5;    // 先頭
  if (lineInfo.pos === 2) s += 1.2;    // 2番手
  if (lineInfo.pos >= 3) s -= 0.5;     // 後方気味

  // --- 風補正 ---
  s -= windSpeed * 0.3;

  // --- 場バンク特性（カント etc） ---
  if (bank && bank.cant) {
    s += bank.cant * 0.2;
  }

  // --- 時間帯 ---
  if (timeZone === "night") s -= 0.5;

  return s;
}

// ===============================
// 買い目生成（本格）
// ===============================
function makeBets(sorted) {
  let top = sorted.slice(0, 4).map(r => r.num);

  // 三連単（最大12点）
  let tris = [];
  for (let a = 0; a < top.length; a++) {
    for (let b = 0; b < top.length; b++) {
      for (let c = 0; c < top.length; c++) {
        if (a !== b && b !== c && a !== c) {
          tris.push(`${top[a]}-${top[b]}-${top[c]}`);
        }
      }
    }
  }
  tris = tris.slice(0, 12);

  // 三連複（上位6名）
  let fuku = sorted.slice(0, 6).map(r => r.num);

  return { tris, fuku };
}

// ===============================
// メイン計算
// ===============================
function calc() {
  const lineStr = document.getElementById("lineInput").value.trim();
  const lines = parseLines(lineStr);

  const bank = bankData.banks.find(b => b.name === bankSelect.value);
  const windDir = Number(document.getElementById("windDir").value);
  const windSpeed = Number(document.getElementById("windSpeed").value);
  const timeZone = timeSelect.value;

  // ライン位置検索
  function findLinePos(num) {
    for (let g of lines) {
      let idx = g.indexOf(num);
      if (idx >= 0) return { group: g, pos: idx + 1 };
    }
    return { group: [num], pos: 1 };
  }

  // 選手データ作成
  let riders = [];
  for (let i = 1; i <= 7; i++) {
    let pos = findLinePos(i);
    riders.push({
      num: i,
      score: Number(document.getElementById("score"+i).value),
      style: document.getElementById("style"+i).value,
      linePos: pos,
    });
  }

  // 補正スコア
  riders.forEach(r => {
    r.adjust = scoreAdjust(r, r.linePos, bank, windDir, windSpeed, timeZone);
  });

  // 並び順
  let sorted = [...riders].sort((a,b)=>b.adjust - a.adjust);

  // 買い目生成
  const bets = makeBets(sorted);

  // 出力
  let out = "<h3>補正後スコアランキング</h3>";
  sorted.forEach(r => {
    out += `選手${r.num}: ${r.adjust.toFixed(2)}<br>`;
  });

  out += `<h3>買い目</h3>`;
  out += `三連単 (${bets.tris.length}点):<br>${bets.tris.join("<br>")}<br><br>`;
  out += `三連複 (${bets.fuku.length}点):<br>${bets.fuku.join(",")}<br>`;

  document.getElementById("result").innerHTML = out;
}
</script>

</body>
</html>
